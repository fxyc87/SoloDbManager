    if (!state.files.length) {
      wrap.appendChild(h('.empty-list', null, t('welcome.noDemoFiles')));
      return wrap;
    }
    state.files.forEach(f => {
      // We don't know if it's SoloDB until we open it; show as SQLite-ish by default.
      const card = h('.demo-card', { onclick: () => openDatabaseByPath(f.path) }, [
        h('.icon.sqlite', { html: ICON.database }),
        h('.info', null, [
          h('.name', null, f.name),
          h('.meta', null, `${formatBytes(f.sizeBytes)} · ${new Date(f.modified).toLocaleString()}`),
        ]),
      ]);
      wrap.appendChild(card);
    });
    return wrap;
  }

  /* ---------- 7. Main app shell ---------- */
  function renderMainApp() {
    const main = document.getElementById('main');
    elclear(main);
    const sidebar = buildSidebar();
    const content = h('.content');
    main.appendChild(sidebar);
    main.appendChild(content);
    renderContent();
  }

  function renderTopbar() {
    // DB summary
    const slot = document.getElementById('db-summary-slot');
    elclear(slot);
    if (state.dbInfo) {
      const info = state.dbInfo;
      slot.appendChild(h('.db-summary', null, [
        h('span.name', { title: info.path }, info.fileName),
        h(`span.badge ${info.isSolodb ? 'badge-solodb' : 'badge-sqlite'}`, null, [
          h('span.badge-dot'), info.isSolodb ? t('info.solodb') : t('info.plainSqlite'),
        ]),
        h('span.stats', null,
          t('dbSummary.stats', { tables: info.tableCount, rows: formatNumber(info.totalRows), size: formatBytes(info.sizeBytes) })),
      ]));
    }
    // Actions
    const acts = document.getElementById('topbar-actions');
    elclear(acts);
    if (state.dbInfo) {
      acts.appendChild(h('button.btn.btn-icon.btn-ghost', {
        title: t('topbar.refresh'), onclick: () => refreshAll(),
      }, h('span', { html: ICON.refresh })));
    }
    acts.appendChild(h('button.btn', { onclick: () => openOpenModal() }, [
      h('span', { html: ICON.folderOpen }), t('topbar.openDatabase'),
    ]));
    acts.appendChild(h('a.btn.btn-ghost.btn-icon', {
      href: DOCS_URL, target: '_blank', rel: 'noopener', title: t('topbar.docsTooltip'),
    }, h('span', { html: ICON.book })));
    acts.appendChild(h('button.btn.btn-icon.btn-ghost.btn-lang', {
      title: state.lang === 'en' ? '中文' : 'English',
      onclick: toggleLang,
    }, state.lang === 'en' ? '中' : 'EN'));
    acts.appendChild(h('button.btn.btn-icon.btn-ghost', {
      title: state.theme === 'light' ? t('topbar.darkMode') : t('topbar.lightMode'),
      onclick: toggleTheme,
    }, h('span', { html: state.theme === 'light' ? ICON.moon : ICON.sun })));
  }

  function buildSidebar() {
    const sidebar = h('.sidebar');
    const head = h('.sidebar-head');
    head.appendChild(h('input.search-input', {
      type: 'text', placeholder: t('sidebar.filterPlaceholder'),
      value: state.sidebarFilter,
      oninput: (e) => {
        state.sidebarFilter = e.target.value;
        renderSidebarList();
      },
    }));
    head.appendChild(h('button.btn.btn-primary.btn-sm', {
      onclick: () => openNewTableModal(),
    }, [
      h('span', { html: ICON.plus }), t('sidebar.newTable'),
    ]));
    sidebar.appendChild(head);

    const list = h('.sidebar-list#sidebar-list');
    sidebar.appendChild(list);
    renderSidebarList(list);
    return sidebar;
  }

  function renderSidebarList(explicitList) {
    const list = explicitList || document.getElementById('sidebar-list');
    if (!list) return;
    elclear(list);

    if (!state.tables.length) {
      list.appendChild(h('.sidebar-empty', null, t('sidebar.empty')));
      return;
    }

    const filter = state.sidebarFilter.toLowerCase().trim();
    const groups = {
      'solodb-collection': [],
      'regular': [],
      'solodb-internal': [],
    };
    state.tables.forEach(t => {
      if (filter && !t.name.toLowerCase().includes(filter)) return;
      groups[t.kind]?.push(t);
    });

    list.appendChild(buildSidebarSection('collections', groups['solodb-collection'], 'collection'));
    list.appendChild(buildSidebarSection('tables', groups['regular'], 'regular'));
    list.appendChild(buildSidebarSection('internal', groups['solodb-internal'], 'internal'));
  }

  function buildSidebarSection(key, items, iconKind) {
    const label = t('sidebar.section.' + key);
    const section = h(`.sidebar-section${state.collapsedSections[key] ? '.collapsed' : ''}`);
    section.id = `section-${key}`;
    const head = h('.sidebar-section-head', { onclick: () => {
      state.collapsedSections[key] = !state.collapsedSections[key];
      section.classList.toggle('collapsed');
    }}, [
      h('.chevron', { html: ICON.chevronRight }),
      h('span', null, label),
      h('span.count', null, String(items.length)),
    ]);
    section.appendChild(head);
    const body = h('.sidebar-section-body');
    items.forEach(t => {
      const isActive = state.selectedTable === t.name;
      const item = h(`.sidebar-item${isActive ? '.active' : ''}`, {
        onclick: () => selectTable(t.name),
        oncontextmenu: (e) => {
          e.preventDefault();
          confirmDropTable(t);
        },
        title: t('sidebar.itemTitle', { name: t.name, kind: kindLabel(t.kind) }),
      }, [
        h(`.icon.${kindIconClass(t.kind)}`),
        h('.name', null, t.name),
        h('.rowcount', null, formatNumber(t.rowCount)),
      ]);
      body.appendChild(item);
    });
    if (!items.length) {
      body.appendChild(h('.sidebar-empty', { style: { padding: '8px 12px' } },
        state.sidebarFilter ? t('sidebar.noMatches') : t('sidebar.none')));
    }
    section.appendChild(body);
    return section;
  }

  function renderContent() {
    const content = document.querySelector('.content');
    if (!content) return;
    elclear(content);

    // Tab bar
    const tabbar = h('.tabbar');
    const tabs = [
      { id: 'data', label: t('tab.data'), disabled: !state.selectedTable },
      { id: 'structure', label: t('tab.structure'), disabled: !state.selectedTable },
      { id: 'query', label: t('tab.query'), disabled: false },
      { id: 'info', label: t('tab.info'), disabled: false },
    ];
    tabs.forEach(t => {
      const cls = `.tab${state.activeTab === t.id ? '.active' : ''}${t.disabled ? '.disabled' : ''}`;
      const tab = h(cls, {
        onclick: () => { if (!t.disabled) switchTab(t.id); },
      }, t.label);
      tabbar.appendChild(tab);
    });
    content.appendChild(tabbar);

    // Panel container
    const panel = h('.tab-panel');
    content.appendChild(panel);

    switch (state.activeTab) {
      case 'data': renderDataTab(panel); break;
      case 'structure': renderStructureTab(panel); break;
      case 'query': renderQueryTab(panel); break;
      case 'info': renderInfoTab(panel); break;
    }
  }

  function switchTab(id) {
    state.activeTab = id;
    renderContent();
  }

  function renderStatusbar() {
    document.getElementById('status-dot').className =
      state.dbInfo ? 'dot connected' : 'dot';
    document.getElementById('status-db').textContent =
      state.dbInfo ? state.dbInfo.fileName : t('status.noDatabase');
    document.getElementById('status-sqlite').textContent =
      state.dbInfo ? `SQLite ${state.dbInfo.sqliteVersion}` : '';
    document.getElementById('status-table').textContent =
      state.selectedTable ? state.selectedTable : t('status.noTableSelected');
    document.getElementById('status-rows').textContent =
      state.data ? ` · ${formatNumber(state.data.total)}${t('status.rowsSuffix')}` : '';
  }

  /* ---------- 8. Data tab ---------- */
  function renderDataTab(panel) {
    if (!state.selectedTable) {
      panel.appendChild(emptyState({
        icon: ICON.table,
        title: t('data.noTableTitle'),
        sub: t('data.noTableSub'),
      }));
      return;
    }

    const tableMeta = state.tables.find(t => t.name === state.selectedTable);
    const isSolodb = tableMeta?.kind === 'solodb-collection';

    // Quick actions bar
    panel.appendChild(buildQuickActionsBar(isSolodb));

    // Toolbar (rebuilt only when switching tabs/tables — preserves search focus during loads)
    const toolbar = h('.data-toolbar');
    toolbar.appendChild(h('.title', null, [
      h(`span.badge ${isSolodb ? 'badge-collection' : 'badge-regular'}`, null, kindLabel(tableMeta?.kind)),
      h('span', null, state.selectedTable),
      h('span', { style: { color: 'var(--text-muted)', fontWeight: '400' } },
        `· ${t('data.rowCount', { n: formatNumber(tableMeta?.rowCount ?? 0) })}`),
    ]));
    toolbar.appendChild(h('.spacer'));

    // Search (debounced) — preserve focus across re-renders by tagging it.
    const search = h('input#data-search.table-search', {
      type: 'text', placeholder: t('data.searchPlaceholder'), value: state.dataParams.search,
      oninput: (e) => {
        clearTimeout(search._t);
        search._t = setTimeout(() => {
          state.dataParams.search = e.target.value;
          state.dataParams.page = 1;
          loadData();
        }, 350);
      },
    });
    toolbar.appendChild(search);

    // Page size
    const sizeSelect = h('select.page-size-select', {
      onchange: (e) => {
        state.dataParams.pageSize = parseInt(e.target.value, 10);
        state.dataParams.page = 1;
        loadData();
      },
    });
    PAGE_SIZE_OPTIONS.forEach(s => {
      const opt = h('option', { value: s }, `${s}${t('data.pageSizeSuffix')}`);
      if (s === state.dataParams.pageSize) opt.selected = true;
      sizeSelect.appendChild(opt);
    });
    toolbar.appendChild(sizeSelect);

    toolbar.appendChild(h('button.btn.btn-icon.btn-ghost', {
      title: t('data.refresh'), onclick: () => loadData(),
    }, h('span', { html: ICON.refresh })));

    toolbar.appendChild(h('button.btn.btn-primary.btn-sm', {
      onclick: () => openInsertModal(),
    }, [
      h('span', { html: ICON.plus }),
      isSolodb ? t('data.newDocument') : t('data.newRow'),
    ]));

    panel.appendChild(toolbar);

    // Grid wrap (updated by renderDataGrid)
    panel.appendChild(h('.data-grid-wrap#data-grid-wrap'));
    panel.appendChild(h('.data-footer#data-footer'));
    renderDataGrid();
  }

  // Quick actions bar — one-click filters and sort shortcuts.
  function buildQuickActionsBar(isSolodb) {
    const bar = h('.quick-actions');
    bar.appendChild(h('span.qa-label', null, t('quick.title')));

    // Column sort selector
    const colSelect = h('select.qa-select', { title: t('quick.selectColumn') });
    const cols = (state.data && state.data.columns) || [];
    colSelect.appendChild(h('option', { value: '' }, t('quick.selectColumn')));
    cols.forEach(c => {
      const opt = h('option', { value: c }, c);
      if (state.dataParams.sort === c) opt.selected = true;
      colSelect.appendChild(opt);
    });
    bar.appendChild(colSelect);

    bar.appendChild(h('button.btn.btn-sm', {
      title: t('quick.sortColAsc'),
      onclick: () => {
        const col = colSelect.value;
        if (!col) return;
        state.dataParams.sort = col;
        state.dataParams.order = 'asc';
        state.dataParams.page = 1;
        loadData();
        // reflect active state in toolbar sort arrows
      },
    }, [
      h('span', { html: ICON.arrowUp }), t('quick.sortColAsc'),
    ]));

    bar.appendChild(h('button.btn.btn-sm', {
      title: t('quick.sortColDesc'),
      onclick: () => {
        const col = colSelect.value;
        if (!col) return;
        state.dataParams.sort = col;
        state.dataParams.order = 'desc';
        state.dataParams.page = 1;
        loadData();
      },
    }, [
      h('span', { html: ICON.arrowDown }), t('quick.sortColDesc'),
    ]));

    bar.appendChild(h('.qa-divider'));

    // Newest / Oldest first (SoloDB collections have an Id column)
    bar.appendChild(h('button.btn.btn-sm.btn-ghost', {
      title: t('quick.newestFirst'),
      onclick: () => {
        // Use 'Id' if present, otherwise first column
        const target = cols.includes('Id') ? 'Id' : (cols[0] || null);
        if (!target) return;
        state.dataParams.sort = target;
        state.dataParams.order = 'desc';
        state.dataParams.page = 1;
        loadData();
      },
    }, t('quick.newestFirst')));

    bar.appendChild(h('button.btn.btn-sm.btn-ghost', {
      title: t('quick.oldestFirst'),
      onclick: () => {
        const target = cols.includes('Id') ? 'Id' : (cols[0] || null);
        if (!target) return;
        state.dataParams.sort = target;
        state.dataParams.order = 'asc';
        state.dataParams.page = 1;
        loadData();
      },
    }, t('quick.oldestFirst')));

    bar.appendChild(h('.qa-divider'));

    // First N rows — input + apply button
    const nInput = h('input.qa-input', {
      type: 'number', min: '1', step: '1', value: '100',
      title: t('quick.firstN') + ' N ' + t('quick.firstNRows'),
      onkeydown: (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          applyNBtn.click();
        }
      },
    });
    bar.appendChild(h('span.qa-static', null, t('quick.firstN')));
    bar.appendChild(nInput);
    bar.appendChild(h('span.qa-static', null, t('quick.firstNRows')));
    const applyNBtn = h('button.btn.btn-sm', {
      onclick: () => {
        const n = parseInt(nInput.value, 10);
        if (!n || n < 1) { toastError(t('quick.firstN') + ' N > 0'); return; }
        // Use a custom page size: clamp to allowed range or pick the closest option
        const supported = PAGE_SIZE_OPTIONS.includes(n);
        if (supported) {
          state.dataParams.pageSize = n;
        } else {
          // Use the largest available option that is >= n, or extend the options list dynamically.
          // We support arbitrary sizes by pushing it into the page-size list at runtime.
          if (!PAGE_SIZE_OPTIONS.includes(n)) PAGE_SIZE_OPTIONS.push(n);
          PAGE_SIZE_OPTIONS.sort((a, b) => a - b);
          state.dataParams.pageSize = n;
        }
        state.dataParams.page = 1;
        // Rebuild the toolbar's page-size select so the new value is visible.
        renderContent();
        loadData();
      },
    }, t('quick.apply'));
    bar.appendChild(applyNBtn);

    bar.appendChild(h('.qa-divider'));

    // Clear filters
    bar.appendChild(h('button.btn.btn-sm.btn-danger', {
      title: t('quick.clear'),
      onclick: () => {
        state.dataParams.sort = null;
        state.dataParams.order = 'asc';
        state.dataParams.search = '';
        state.dataParams.page = 1;
        const searchEl = document.getElementById('data-search');
        if (searchEl) searchEl.value = '';
        renderContent();
        loadData();
      },
    }, [
      h('span', { html: ICON.x }), t('quick.clear'),
    ]));

    return bar;
  }

  // Updates only the data grid and footer — preserves the toolbar (and search focus).
  function renderDataGrid() {
    const gridWrap = document.getElementById('data-grid-wrap');
    const footer = document.getElementById('data-footer');
    if (!gridWrap || !footer) return;
    elclear(gridWrap);
    elclear(footer);

    if (state.loading.data) {
      gridWrap.appendChild(h('.loading-overlay', null, h('.loading-spinner')));
    }

    if (!state.data || !state.data.rows || !state.data.rows.length) {
      const meta = state.tables.find(t => t.name === state.selectedTable);
      const isSolodb = meta?.kind === 'solodb-collection';
      gridWrap.appendChild(emptyState({
        icon: ICON.table,
        title: state.data ? t('data.noRows') : (state.loading.data ? t('data.loading') : t('data.noData')),
        sub: state.data
          ? (state.dataParams.search ? t('data.noMatch') : (isSolodb ? t('data.emptyCollection') : t('data.empty')))
          : t('data.fetching'),
        small: true,
      }));
      if (state.data) renderDataFooterInto(footer);
      return;
    }

    // Build table
    const tbl = h('table.data-grid');
    const thead = h('thead');
    const tr = h('tr');
    state.data.columns.forEach(col => {
      const isActive = state.dataParams.sort === col;
      const th = h(`th${isActive ? '.active' : ''}`, {
        onclick: () => toggleSort(col),
      }, h('.col-head', null, [
        h('span.col-name', null, col),
        h('span.type-badge', null, inferColType(col)),
        isActive ? h('span.sort-arrow', { html: state.dataParams.order === 'asc' ? ICON.arrowUp : ICON.arrowDown }) : null,
      ]));
      tr.appendChild(th);
    });
    tr.appendChild(h('th.action-col', null, ''));
    thead.appendChild(tr);
    tbl.appendChild(thead);

    const tbody = h('tbody');
    state.data.rows.forEach(row => {
      const tr = h('tr');
      state.data.columns.forEach(col => {
        const td = h('td');
        td.appendChild(renderCell(row[col]));
        tr.appendChild(td);
      });
      // Actions cell
      const actTd = h('td');
      actTd.appendChild(h('.row-actions', null, [
        h('button.btn.btn-icon', {
          title: t('data.edit'), onclick: (e) => { e.stopPropagation(); openEditModal(row); },
        }, h('span', { html: ICON.edit })),
        h('button.btn.btn-icon.danger', {
          title: t('data.delete'), onclick: (e) => { e.stopPropagation(); confirmDeleteRow(row); },
        }, h('span', { html: ICON.trash })),
      ]));
      tr.appendChild(actTd);
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    gridWrap.appendChild(tbl);

    renderDataFooterInto(footer);
  }

  function inferColType(col) {
    if (!state.data || !state.data.rows.length) return '';
    // Sample first 20 non-null rows
    let sampled = null;
    for (let i = 0; i < Math.min(state.data.rows.length, 20); i++) {
      const v = state.data.rows[i][col];
      if (v !== null && v !== undefined) { sampled = v; break; }
    }
    if (sampled === null) return 'null';
    const k = classify(sampled);
    return k;
  }

  function toggleSort(col) {
    if (state.dataParams.sort === col) {
      state.dataParams.order = state.dataParams.order === 'asc' ? 'desc' : 'asc';
    } else {
      state.dataParams.sort = col;
      state.dataParams.order = 'asc';
    }
    loadData();
  }

  function renderDataFooterInto(footer) {
    if (!state.data) return;
    const { page, pageSize, total } = state.data;
    const totalPages = Math.max(1, Math.ceil(total / pageSize));
    const from = total === 0 ? 0 : (page - 1) * pageSize + 1;
    const to = Math.min(page * pageSize, total);

    footer.appendChild(h('.page-info', null,
      t('data.showing', { from: formatNumber(from), to: formatNumber(to), total: formatNumber(total) })));
    footer.appendChild(h('.spacer'));
    footer.appendChild(h('.page-nav', null, [
      h('button.btn.btn-icon.btn-sm', {
        title: t('data.firstPage'), disabled: page <= 1,
        onclick: () => { state.dataParams.page = 1; loadData(); },
      }, h('span', { html: ICON.chevronsLeft })),
      h('button.btn.btn-icon.btn-sm', {
        title: t('data.prevPage'), disabled: page <= 1,
        onclick: () => { state.dataParams.page = Math.max(1, page - 1); loadData(); },
      }, h('span', { html: ICON.chevronLeft })),
      h('span', { style: { padding: '0 8px', alignSelf: 'center' } },
        t('data.pageOf', { page, total: totalPages })),
      h('button.btn.btn-icon.btn-sm', {
        title: t('data.nextPage'), disabled: page >= totalPages,
        onclick: () => { state.dataParams.page = Math.min(totalPages, page + 1); loadData(); },
      }, h('span', { html: ICON.chevronRight2 })),
      h('button.btn.btn-icon.btn-sm', {
        title: t('data.lastPage'), disabled: page >= totalPages,
        onclick: () => { state.dataParams.page = totalPages; loadData(); },
      }, h('span', { html: ICON.chevronsRight })),
    ]));
  }

  function emptyState({ icon, title, sub, small }) {
    return h(`.empty-state${small ? '' : ''}`, null, [
      h('.icon-big', { html: icon }),
      h('h3', null, title),
      h('p', null, sub),
    ]);
  }

  /* ---------- 9. Structure tab ---------- */
  function renderStructureTab(panel) {
    if (!state.selectedTable) {
      panel.appendChild(emptyState({
        icon: ICON.table,
        title: t('structure.noTableTitle'),
        sub: t('structure.noTableSub'),
      }));
      return;
    }
    const wrap = h('.structure-panel');
    panel.appendChild(wrap);

    if (state.loading.schema) {
      wrap.appendChild(h('.loading-overlay', null, h('.loading-spinner')));
      return;
    }
    if (!state.selectedSchema) {
      wrap.appendChild(emptyState({ icon: ICON.info, title: t('structure.noSchemaTitle'), sub: t('structure.noSchemaSub') }));
      return;
    }

    const s = state.selectedSchema;
    const meta = state.tables.find(t => t.name === s.name);
    const isSolodb = s.kind === 'solodb-collection';

    wrap.appendChild(h('.structure-header', null, [
      h('.name', null, s.name),
      h(`span.badge ${kindBadgeClass(s.kind)}`, null, kindLabel(s.kind)),
      h('.stats', null, [
        t('structure.rowCount', { n: formatNumber(s.rowCount) }),
        s.sizeBytes != null ? ` · ${formatBytes(s.sizeBytes)}` : '',
      ]),
    ]));

    // Columns block
    wrap.appendChild(h('.structure-block', null, [
      h('h3', null, t('structure.columns', { n: s.columns.length })),
      buildColumnsTable(s.columns),
    ]));

    // Document fields (solodb only)
    if (isSolodb && s.documentFields && s.documentFields.length) {
      wrap.appendChild(h('.structure-block', null, [
        h('h3', null, t('structure.docFields', { n: s.documentFields.length })),
        buildDocFieldsGrid(s.documentFields),
      ]));
    }

    // Indexes
    if (s.indexes && s.indexes.length) {
      wrap.appendChild(h('.structure-block', null, [
        h('h3', null, t('structure.indexes', { n: s.indexes.length })),
        buildIndexesList(s.indexes),
      ]));
    }

    // DDL
    if (s.createSql) {
      wrap.appendChild(h('.structure-block', null, [
        h('h3', null, t('structure.ddl')),
        h('pre.ddl-block', null, s.createSql),
      ]));
    }
  }

  function buildColumnsTable(columns) {
    const tbl = h('table.data-grid.compact');
    const thead = h('thead');
    const headRow = h('tr');
    const headers = [
      { key: 'hash', label: t('structure.col.hash'), width: '40px' },
      { key: 'name', label: t('structure.col.name'), width: null },
      { key: 'type', label: t('structure.col.type'), width: null },
      { key: 'null', label: t('structure.col.null'), width: '60px' },
      { key: 'key', label: t('structure.col.key'), width: '60px' },
      { key: 'default', label: t('structure.col.default'), width: null },
    ];
    headers.forEach(hd => {
      headRow.appendChild(h('th', { style: hd.width ? { width: hd.width } : null }, hd.label));
    });
    thead.appendChild(headRow);
    tbl.appendChild(thead);

    const tbody = h('tbody');
    columns.forEach((c, i) => {
      const tr = h('tr');
      tr.appendChild(h('td', { style: { color: 'var(--text-faint)', textAlign: 'right', fontFamily: 'var(--font-mono)' } }, String(i + 1)));
      tr.appendChild(h('td', null, h('span', { style: { fontFamily: 'var(--font-mono)', fontWeight: '600' } }, c.name)));
      tr.appendChild(h('td', null, h('span.col-type', null, c.type || t('structure.anyType'))));
      tr.appendChild(h('td', null, c.notNull ? h('span', { style: { color: 'var(--rose)', fontWeight: '600' } }, t('structure.notNull')) : h('span', { style: { color: 'var(--text-faint)' } }, t('structure.null'))));
      tr.appendChild(h('td', null, c.primaryKey ? h(`span.badge.badge-solodb`, null, [h('span.badge-dot'), t('structure.pk')]) : ''));
      tr.appendChild(h('td', null, h('span', { style: { fontFamily: 'var(--font-mono)', fontSize: '11px', color: 'var(--text-muted)' } }, c.defaultValue ?? '—')));

          ta.value = s.sql();

      placeholder: t('query.placeholder'),

      onkeydown: (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
          e.preventDefault();
          runQuery();
        }
      },

    // Stats bar
    if (state.query.result) {

      wrap.appendChild(h('.query-stats', null, [
        r.error
          ? h('.stat', { style: { color: 'var(--rose)' } }, [h('strong', null, t('query.error'))])
          : h('.stat', null, [h('strong', null, formatNumber(r.rows.length)), t('query.rows')]),
        h('.stat', null, [h('strong', null, formatNumber(r.rowsAffected)), t('query.affected')]),
        h('.stat', null, [h('strong', null, r.durationMs + ' ms'), t('query.duration')]),
      ]));
    }

    // Error display
    if (state.query.error) {
      wrap.appendChild(h('.query-error', null, state.query.error));
    } else if (state.query.result && state.query.result.error) {
      wrap.appendChild(h('.query-error', null, state.query.result.error));

    wrap.appendChild(resultsWrap);

      resultsWrap.appendChild(h('.loading-overlay', null, h('.loading-spinner')));
    } else if (state.query.result && !state.query.result.error && state.query.result.rows) {
      renderQueryResults(resultsWrap, state.query.result);

      resultsWrap.appendChild(h('.query-empty', null, t('query.empty')));

  function renderQueryResults(wrap, result) {
    if (!result.columns || !result.columns.length) {
      wrap.appendChild(h('.query-empty', null, t('query.executed')));
      return;
    }
    const tbl = h('table.data-grid');
    const thead = h('thead');
    const headRow = h('tr');
    result.columns.forEach(col => {
      headRow.appendChild(h('th', { onclick: () => {} }, h('.col-head', null, [
        h('span.col-name', null, col),
      ])));
    });
    thead.appendChild(headRow);
    tbl.appendChild(thead);

    const tbody = h('tbody');
    result.rows.forEach(row => {
      const tr = h('tr');
      row.forEach(cell => {
        const td = h('td');
        td.appendChild(renderCell(cell));
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    wrap.appendChild(tbl);
  }

  async function runQuery() {
    if (!state.activeDb) { toastError(t('query.openFirst')); return; }
    const sql = (document.getElementById('query-editor-ta')?.value || '').trim();
    if (!sql) { toastError(t('query.sqlEmpty')); return; }
    state.query.loading = true;
    state.query.error = null;
    state.query.result = null;
    renderContent();
    try {
      const res = await API.runQuery(state.activeDb, sql);
      state.query.result = res.result;
      if (res.result?.error) {
        state.query.error = res.result.error;
      }
    } catch (e) {
      state.query.error = e.message;
    } finally {
      state.query.loading = false;
      renderContent();
    }
  }

  /* ---------- 12. Modals ---------- */
  function openModal(node) {

  /* ----- Open Database modal ----- */
  function openOpenModal() {
    const modal = h('.modal.modal-lg');
    modal.appendChild(h('.modal-header', null, [
      h('h2', null, t('open.title')),
      h('button.modal-close', { html: ICON.x, onclick: closeModal }),
    ]));

    // Tabs
    const tabsWrap = h('.modal-tabs');
    const panes = { files: h('.modal-tab-pane'), recent: h('.modal-tab-pane'), path: h('.modal-tab-pane'), browse: h('.modal-tab-pane.browse-pane') };
    const tabBtns = {};
    function activateTab(id) {
      Object.entries(tabBtns).forEach(([k, b]) => b.classList.toggle('active', k === id));
      Object.entries(panes).forEach(([k, p]) => p.classList.toggle('active', k === id));
    }
    [['files', t('open.tab.files')], ['recent', t('open.tab.recent')], ['path', t('open.tab.path')], ['browse', t('open.tab.browse')]].forEach(([id, label]) => {
      const b = h('.modal-tab', { onclick: () => activateTab(id) }, label);
      tabBtns[id] = b;
      tabsWrap.appendChild(b);
    });
    modal.appendChild(tabsWrap);

    // Files pane
    const filesPane = panes.files;
    filesPane.appendChild(h('.form-hint', { style: { marginBottom: '8px' } }, t('open.files.hint')));

    // Upload dropzone
    const dropzone = h('.upload-dropzone', { tabindex: '0' }, [
      h('span', { html: ICON.upload || '↑' }),
      h('span', null, t('open.dropzone.pre')),
      h('span.link', null, t('open.dropzone.link')),
    ]);
    const fileInput = h('input', { type: 'file', accept: '.db,.sqlite,.sqlite3,.db-wal,.db-shm,.sqlite-wal,.sqlite-shm,.sqlite3-wal,.sqlite3-shm', multiple: true, style: { display: 'none' } });
    dropzone.appendChild(fileInput);
    filesPane.appendChild(dropzone);

    const fileList = h('.file-list');
    filesPane.appendChild(fileList);
    loadFilesForModal(fileList);

    // Upload handlers (drag & drop + click)
    const handleUpload = async (files) => {
      if (!files || !files.length) return;
      try {
        for (const file of files) {
          await API.uploadFile(file);
        }
        toastSuccess(t('toast.uploadedN', { n: files.length }));
        loadFilesForModal(fileList);
      } catch (e) {
        toastError(t('toast.uploadFailed') + e.message);
      }
    };
    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => handleUpload([...fileInput.files]));
    ['dragenter', 'dragover'].forEach(ev => dropzone.addEventListener(ev, e => {
      e.preventDefault(); e.stopPropagation();
      dropzone.classList.add('drag-over');
    }));
    ['dragleave', 'drop'].forEach(ev => dropzone.addEventListener(ev, e => {
      e.preventDefault(); e.stopPropagation();
      dropzone.classList.remove('drag-over');
    }));
    dropzone.addEventListener('drop', e => handleUpload([...(e.dataTransfer?.files || [])]));


    // Recent pane
    const recentPane = panes.recent;
    const connList = h('.conn-list');
    recentPane.appendChild(connList);
    loadConnectionsForModal(connList);

    // Path pane
    const pathPane = panes.path;
    pathPane.appendChild(h('.form-row', null, [
      h('label', null, t('open.pathLabel')),
      h('input.form-input#open-path-input', { type: 'text', placeholder: t('open.pathPlaceholder') }),
      h('.form-hint', null, t('open.pathHint')),
    ]));
    pathPane.appendChild(h('.form-row', null, [
      h('label', null, t('open.createLabel')),
      h('input.form-input#open-create-input', { type: 'text', placeholder: t('open.createPlaceholder') }),
      h('.form-hint', null, t('open.createHint')),
    ]));
    pathPane.appendChild(h('.modal-footer', { style: { padding: '12px 0 0', border: 'none' } }, [
      h('button.btn', { onclick: closeModal }, t('open.cancel')),
      h('button.btn.btn-primary', {
        onclick: () => {
          const pathInput = document.getElementById('open-path-input').value.trim();
          const createInput = document.getElementById('open-create-input').value.trim();
          const target = createInput || pathInput;
          if (!target) { toastError(t('open.enterPath')); return; }
          openDatabaseByPath(target, !!createInput);
        },
      }, [h('span', { html: ICON.folderOpen }), t('open.open')]),
    ]));

    // Browse pane (local filesystem browser — no upload needed)
    const browsePane = panes.browse;
    buildBrowsePane(browsePane);

    Object.values(panes).forEach(p => modal.appendChild(p));
    activateTab('files');
    openModal(modal);
  }

  // Builds the local filesystem browser pane inside the Open modal.
  // Calls GET /api/database/browse?dir=<path> and lets the user navigate folders
  // or click a database file to open it directly by path.
  function buildBrowsePane(pane) {
    elclear(pane);
    pane.appendChild(h('.browse-hint', null, t('browse.hint')));

    // Path bar with Up button
    const pathBar = h('.browse-path-bar');
    const upBtn = h('button.btn.btn-sm.btn-ghost', {
      title: t('browse.parent'),
      onclick: () => {
        if (currentBrowseState && currentBrowseState.parent != null) {
          loadBrowseDir(currentBrowseState.parent);
        }
      },
    }, [h('span', { html: ICON.chevronUp }), t('browse.up')]);
    const pathLabel = h('span.path-label', null, t('browse.breadcrumb'));
    const pathText = h('span.path-text');
    pathBar.appendChild(upBtn);
    pathBar.appendChild(pathLabel);
    pathBar.appendChild(pathText);
    pane.appendChild(pathBar);

    const listWrap = h('.browse-list');
    pane.appendChild(listWrap);

    // Home button at the bottom (small)
    const homeBtn = h('button.btn.btn-sm.btn-ghost', {
      style: { marginTop: '8px' },
      onclick: () => loadBrowseDir(null),
    }, [h('span', { html: ICON.folderOpen }), t('browse.home')]);
    pane.appendChild(homeBtn);

    let currentBrowseState = null;

    async function loadBrowseDir(dir) {
      elclear(listWrap);
      listWrap.appendChild(h('.browse-empty', null, t('browse.loading')));
      upBtn.disabled = true;
      try {
        const res = await API.browsePath(dir);
        currentBrowseState = res;
        // Update path text
        pathText.textContent = res.current || dir || '~';
        upBtn.disabled = (res.parent == null);
        elclear(listWrap);

        if (res.error) {
          listWrap.appendChild(h('.browse-error', null, res.error));
          // Still allow Up navigation
          if (res.parent != null) {
            listWrap.appendChild(h('.browse-empty', null, '↑ ' + t('browse.up')));
          }
          return;
        }

        const entries = res.entries || [];
        if (!entries.length) {
          listWrap.appendChild(h('.browse-empty', null, t('browse.empty')));
          return;
        }

        // Sort: folders first, then files, alphabetical
        entries.sort((a, b) => {
          if (a.isDir !== b.isDir) return a.isDir ? -1 : 1;
          return a.name.localeCompare(b.name, undefined, { numeric: true });
        });

        entries.forEach(entry => {
          const item = h(`.browse-item.${entry.isDir ? 'folder' : 'dbfile'}`, {
            title: entry.isDir ? t('browse.openFolder') : t('browse.openFile'),
            onclick: () => {
              if (entry.isDir) {
                loadBrowseDir(entry.path);
                try { localStorage.setItem('solodb-browse-dir', entry.path); } catch {}
              } else {
                // Open the database file directly by path
                openDatabaseByPath(entry.path);
              }
            },
          }, [
            h('.icon.' + (entry.isDir ? 'folder' : 'dbfile'), {
              html: entry.isDir ? ICON.folder : ICON.database,
            }),
            h('.name', null, entry.name),
            entry.isDir
              ? null
              : h('.meta', null, formatBytes(entry.size)),
          ]);
          listWrap.appendChild(item);
        });
      } catch (e) {
        elclear(listWrap);
        listWrap.appendChild(h('.browse-error', null, t('browse.errorTitle') + ': ' + e.message));
      }
    }

    // Start at last-visited dir or home
    let startDir = null;
    try {
      const saved = localStorage.getItem('solodb-browse-dir');
      if (saved) startDir = saved;
    } catch {}
    loadBrowseDir(startDir);
  }

  async function loadFilesForModal(fileList) {
    elclear(fileList);
    fileList.appendChild(h('.empty-list', null, t('open.loading')));
    try {
      const res = await API.listFiles();
      state.files = res.files || [];
      elclear(fileList);
      if (!state.files.length) {
        fileList.appendChild(h('.empty-list', null, t('open.noFiles')));
        return;
      }
      state.files.forEach(f => {
        const item = h('.file-item', {
          onclick: () => openDatabaseByPath(f.path),
        }, [
          h('.icon.sqlite', { html: ICON.database }),
          h('.info', null, [
            h('.name', null, f.name),
            h('.meta', null, `${formatBytes(f.sizeBytes)} · ${f.path}`),
          ]),
          h('button.conn-item-delete.delete-btn', {
            title: t('open.deleteFileTitle'),
            html: ICON.trash,
            onclick: async (e) => {
              e.stopPropagation();
              if (!confirm(t('open.deleteFileConfirm', { name: f.name }))) return;
              try {
                await API.deleteFile(f.name);
                toastSuccess(t('toast.deleted', { name: f.name }));
                loadFilesForModal(fileList);
              } catch (err) {
                toastError(t('toast.deleteFailed') + err.message);
              }
            },
          }),
        ]);
        fileList.appendChild(item);
      });
    } catch (e) {
      elclear(fileList);
      fileList.appendChild(h('.empty-list', null, t('toast.error') + ': ' + e.message));
    }
  }

  async function loadConnectionsForModal(connList) {

            h('.meta', null, [

              t('open.lastOpened'),

    body.appendChild(h('.kind-selector', null, [
      kindCard('solodb', t('newtable.solodb.title'), t('newtable.solodb.desc'), ICON.layers),
      kindCard('regular', t('newtable.regular.title'), t('newtable.regular.desc'), ICON.table),
    ]));

    body.appendChild(h('.form-row', null, [
      h('label', null, t('newtable.nameLabel')),
      h('input.form-input#new-table-name', {
        type: 'text', placeholder: t('newtable.namePlaceholder'),
        value: newTableState.name,
        oninput: (e) => { newTableState.name = e.target.value; },
      }),
    ]));

    const columnsBlock = h('div#new-table-columns');
    body.appendChild(columnsBlock);
    renderColumnBuilder(columnsBlock);

    body.appendChild(h('.form-hint', { id: 'new-table-note' }, newTableNote()));

    modal.appendChild(body);

    modal.appendChild(h('.modal-footer', null, [
      h('button.btn', { onclick: closeModal }, t('newtable.cancel')),
      h('button.btn.btn-primary', { onclick: createTableFromModal }, [
        h('span', { html: ICON.plus }), t('newtable.create'),
      ]),
    ]));

    openModal(modal);
  }

  function kindCard(kind, title, desc, icon) {
    const selected = newTableState.kind === (kind === 'solodb' ? 'solodb-collection' : 'regular');
    const card = h(`.kind-card.${kind}${selected ? '.selected' : ''}`, {
      onclick: () => {
        newTableState.kind = kind === 'solodb' ? 'solodb-collection' : 'regular';
        // Re-render modal without resetting state.
        openNewTableModal._rebuilding = true;
        closeModal();
        openNewTableModal();
      },
    }, [
      h('.icon-wrap', { html: icon }),
      h('h4', null, title),
      h('p', null, desc),
    ]);
    return card;
  }

  function newTableNote() {
    if (newTableState.kind === 'solodb-collection') {
      return t('newtable.noteSolodb');
    }
    return t('newtable.noteRegular');
  }

  const COLUMN_TYPES = ['INTEGER', 'TEXT', 'REAL', 'BLOB', 'NUMERIC', 'BOOLEAN', 'DATETIME'];
  function renderColumnBuilder(wrap) {
    elclear(wrap);
    if (newTableState.kind !== 'regular') return;
    wrap.appendChild(h('label', { style: { display: 'block', fontSize: '12px', fontWeight: '600', color: 'var(--text-muted)', margin: '8px 0 6px' } }, t('newtable.columns')));
    newTableState.columns.forEach((col, idx) => {
      const row = h('.column-row', null, [
        h('input', {
          type: 'text', placeholder: t('newtable.colNamePlaceholder'), value: col.name,
          oninput: (e) => { newTableState.columns[idx].name = e.target.value; },
        }),
        (() => {
          const sel = h('select', {
            onchange: (e) => { newTableState.columns[idx].type = e.target.value; },
          });
          COLUMN_TYPES.forEach(t => {
            const opt = h('option', { value: t }, t);
            if (t === col.type) opt.selected = true;
            sel.appendChild(opt);
          });
          return sel;
        })(),
        h('.col-check', null, h('label', null, [
          h('input', {
            type: 'checkbox', checked: col.pk,
            onchange: (e) => { newTableState.columns[idx].pk = e.target.checked; },
          }),
          t('newtable.pk'),
        ])),
        h('.col-check', null, h('label', null, [
          h('input', {
            type: 'checkbox', checked: col.notNull,
            onchange: (e) => { newTableState.columns[idx].notNull = e.target.checked; },
          }),
          t('newtable.nn'),
        ])),
        h('button.col-remove', {
          html: ICON.x, title: t('newtable.removeColumn'),
          onclick: () => { newTableState.columns.splice(idx, 1); renderColumnBuilder(wrap); },
        }),
      ]);
      wrap.appendChild(row);
    });
    wrap.appendChild(h('button.btn.btn-sm', {
      style: { marginTop: '6px' },
      onclick: () => {
        newTableState.columns.push({ name: '', type: 'TEXT', pk: false, notNull: false });
        renderColumnBuilder(wrap);
      },
    }, [h('span', { html: ICON.plus }), t('newtable.addColumn')]));
  }

  async function createTableFromModal() {
    const name = newTableState.name.trim();
    if (!name) { toastError(t('newtable.enterName')); return; }
    if (newTableState.kind === 'regular') {
      const valid = newTableState.columns.filter(c => c.name.trim());
      if (!valid.length) { toastError(t('newtable.addCol')); return; }
      try {
        await API.createTable({
          db: state.activeDb,
          name,
          kind: 'regular',
          columns: valid.map(c => ({
            name: c.name.trim(),
            type: c.type,
            primaryKey: !!c.pk,
            notNull: !!c.notNull,
          })),
        });
      } catch (e) { toastError(e.message); return; }
    } else {
      try {
        await API.createTable({ db: state.activeDb, name, kind: 'solodb-collection' });
      } catch (e) { toastError(e.message); return; }
    }
    toastSuccess(newTableState.kind === 'solodb-collection'
      ? t('newtable.createdCollection', { name })
      : t('newtable.createdTable', { name }));
    closeModal();
    await refreshTables();
    selectTable(name);
  }

  /* ----- Insert / Edit modal ----- */
  let editState = null;
  function openInsertModal() {
    if (!state.selectedTable) return;
    const meta = state.tables.find(t => t.name === state.selectedTable);
    const isSolodb = meta?.kind === 'solodb-collection';
    editState = { mode: 'insert', isSolodb, row: null, schema: state.selectedSchema };
    buildEditModal();
  }

  function openEditModal(row) {
    const meta = state.tables.find(t => t.name === state.selectedTable);
    const isSolodb = meta?.kind === 'solodb-collection';
    editState = { mode: 'edit', isSolodb, row, schema: state.selectedSchema };
    buildEditModal();
  }

  function buildEditModal() {
    if (!editState) return;
    const { mode, isSolodb, row, schema } = editState;
    const isEdit = mode === 'edit';

    const titleMode = isEdit
      ? (isSolodb ? t('edit.editDocument') : t('edit.editRow'))
      : (isSolodb ? t('edit.newDocument') : t('edit.newRow'));
    const modal = h('.modal');
    modal.appendChild(h('.modal-header', null, [
      h('h2', null, `${titleMode}${t('edit.titleSep')}${state.selectedTable}`),
      h('button.modal-close', { html: ICON.x, onclick: closeModal }),
    ]));

    const body = h('.modal-body');

    if (isSolodb) {
      // JSON editor with two tabs: Value, Metadata
      const tabsWrap = h('.modal-tabs');
      const valuePane = h('.modal-tab-pane');
      const metaPane = h('.modal-tab-pane');
      const tabBtns = {};
      function activate(id) {
        Object.entries(tabBtns).forEach(([k, b]) => b.classList.toggle('active', k === id));
        valuePane.classList.toggle('active', id === 'value');
        metaPane.classList.toggle('active', id === 'meta');
      }
      const valBtn = h('.modal-tab', { onclick: () => activate('value') }, t('edit.tabValue'));
      const metaBtn = h('.modal-tab', { onclick: () => activate('meta') }, t('edit.tabMetadata'));
      tabBtns.value = valBtn; tabBtns.meta = metaBtn;
      tabsWrap.appendChild(valBtn); tabsWrap.appendChild(metaBtn);
      modal.appendChild(tabsWrap);

      // Value textarea
      let initialValue = isEdit ? row.__rawValue : { Name: '', Email: '' };
      if (typeof initialValue === 'string') {
        try { initialValue = JSON.parse(initialValue); } catch {}
      }
      const valueTa = h('textarea.form-textarea.tall', { spellcheck: 'false' });
      valueTa.value = JSON.stringify(initialValue, null, 2);
      valuePane.appendChild(h('.form-hint', { style: { marginBottom: '6px' } },
        t('edit.valueHint')));
      valuePane.appendChild(valueTa);
      valuePane.appendChild(h('.form-hint', { style: { marginTop: '6px' } },
        t('edit.valueTip')));

      // Metadata textarea
      let initialMeta = isEdit ? row.__metadata : null;
      if (typeof initialMeta === 'string') {
        try { initialMeta = JSON.parse(initialMeta); } catch {}
      }
      const metaTa = h('textarea.form-textarea.tall', { spellcheck: 'false' });
      metaTa.value = initialMeta ? JSON.stringify(initialMeta, null, 2) : '';
      metaPane.appendChild(h('.form-hint', { style: { marginBottom: '6px' } },
        t('edit.metaHint')));
      metaPane.appendChild(metaTa);

      modal.appendChild(valuePane);
      modal.appendChild(metaPane);
      activate('value');

      modal.appendChild(h('.modal-footer', null, [
        h('button.btn', { onclick: closeModal }, t('edit.cancel')),
        h('button.btn.btn-primary', {
          onclick: async () => {
            let value, metadata;
            try { value = JSON.parse(valueTa.value || '{}'); }
            catch (e) { toastError(t('edit.valueInvalid') + e.message); return; }
            if (metaTa.value.trim()) {
              try { metadata = JSON.parse(metaTa.value); }
              catch (e) { toastError(t('edit.metaInvalid') + e.message); return; }
            }
            try {
              if (isEdit) {
                await API.updateRow(state.selectedTable, state.activeDb, {
                  identifier: row.__identifier, value, metadata,
                });
                toastSuccess(t('edit.docUpdated'));
              } else {
                await API.insertRow(state.selectedTable, state.activeDb, {
                  value, metadata,
                });
                toastSuccess(t('edit.docInserted'));
              }
              closeModal();
              await loadData();
              await refreshTables();
            } catch (e) { toastError(e.message); }
          },
        }, [h('span', { html: ICON.check }), isEdit ? t('edit.save') : t('edit.insert')]),
      ]));

    } else {
      // Regular table form
      if (!schema) {
        body.appendChild(h('.empty-list', null, t('edit.schemaNotLoaded')));
        modal.appendChild(body);
        modal.appendChild(h('.modal-footer', null, h('button.btn', { onclick: closeModal }, t('edit.close'))));
        openModal(modal);
        return;
      }
      const formState = {};
      schema.columns.forEach(col => {
        const isPk = col.primaryKey;
        const val = isEdit ? row[col.name] : (col.defaultValue ?? '');
        formState[col.name] = val;
        const isReadOnly = isEdit && isPk;
        const rowEl = h('.form-row', null, [
          h('label', null, [
            col.name,
            isPk ? h('span.badge.badge-solodb', { style: { marginLeft: '6px' } }, t('edit.pk')) : null,
            col.notNull ? h('span', { style: { marginLeft: '6px', color: 'var(--text-faint)', fontSize: '10px' } }, t('edit.notNull')) : null,
          ]),
          h('input.form-input', {
            type: 'text', value: val ?? '', readOnly: isReadOnly,
            disabled: isReadOnly,
            style: isReadOnly ? { background: 'var(--bg-elev)', color: 'var(--text-muted)' } : null,
            oninput: (e) => { formState[col.name] = e.target.value; },
          }),
          h('.form-hint', null, col.defaultValue != null
            ? t('edit.colHintDefault', { type: col.type || t('structure.anyType'), default: col.defaultValue })
            : (col.type || t('structure.anyType'))),
        ]);
        body.appendChild(rowEl);
      });
      modal.appendChild(body);

      modal.appendChild(h('.modal-footer', null, [
        h('button.btn', { onclick: closeModal }, t('edit.cancel')),
        h('button.btn.btn-primary', {
          onclick: async () => {
            const values = {};
            schema.columns.forEach(col => {
              if (isEdit && col.primaryKey) return; // don't send PK on update
              let v = formState[col.name];
              const type = (col.type || '').toUpperCase();
              if (v === '' || v == null) {
                values[col.name] = null;
              } else if (type === 'INTEGER' || type === 'INT') {
                values[col.name] = parseInt(v, 10);
                if (isNaN(values[col.name])) values[col.name] = v;
              } else if (type === 'REAL' || type === 'FLOAT' || type === 'DOUBLE') {
                values[col.name] = parseFloat(v);
                if (isNaN(values[col.name])) values[col.name] = v;
              } else if (type === 'BOOLEAN') {
                values[col.name] = ['true', '1', 'yes', 'y'].includes(String(v).toLowerCase());
              } else {
                values[col.name] = v;
              }
            });
            try {
              if (isEdit) {
                await API.updateRow(state.selectedTable, state.activeDb, {
                  identifier: row.__identifier, values,
                });
                toastSuccess(t('edit.rowUpdated'));
              } else {
                await API.insertRow(state.selectedTable, state.activeDb, { values });
                toastSuccess(t('edit.rowInserted'));
              }
              closeModal();
              await loadData();
              await refreshTables();
            } catch (e) { toastError(e.message); }
          },
        }, [h('span', { html: ICON.check }), isEdit ? t('edit.save') : t('edit.insert')]),
      ]));
    }

    openModal(modal);
  }

  /* ----- Confirm dialogs ----- */
  function confirmDeleteRow(row) {
    const modal = h('.modal', { style: { maxWidth: '420px' } });
    modal.appendChild(h('.modal-header', null, [
      h('h2', null, t('confirm.deleteRowTitle')),
      h('button.modal-close', { html: ICON.x, onclick: closeModal }),
    ]));
    modal.appendChild(h('.modal-body', null, [
      h('p.confirm-text', null, t('confirm.deleteRowText')),
      h('p.confirm-sub', null, t('confirm.deleteRowSub')),
    ]));
    modal.appendChild(h('.modal-footer', null, [
      h('button.btn', { onclick: closeModal }, t('confirm.cancel')),
      h('button.btn.btn-danger', {
        onclick: async () => {
          try {
            await API.deleteRow(state.selectedTable, state.activeDb, { identifier: row.__identifier });
            toastSuccess(t('confirm.rowDeleted'));
            closeModal();
            await loadData();
            await refreshTables();
          } catch (e) { toastError(e.message); }
        },
      }, [h('span', { html: ICON.trash }), t('confirm.delete')]),
    ]));
    openModal(modal);
  }

  function confirmDropTable(tableMeta) {
    const modal = h('.modal', { style: { maxWidth: '420px' } });
    modal.appendChild(h('.modal-header', null, [
      h('h2', null, t('confirm.dropTitle', { kind: kindLabelLower(tableMeta.kind) })),
      h('button.modal-close', { html: ICON.x, onclick: closeModal }),
    ]));
    modal.appendChild(h('.modal-body', null, [
      h('p.confirm-text', null, [
        t('confirm.dropPrefix'), h('strong', null, tableMeta.name), t('confirm.dropSuffix'),
      ]),
      h('p.confirm-sub', null, t('confirm.dropSub', { kind: kindLabelLower(tableMeta.kind), n: formatNumber(tableMeta.rowCount) })),
      h('input.form-input#confirm-drop-input', {
        type: 'text', placeholder: t('confirm.dropPlaceholder'), style: { marginTop: '8px' },
      }),
    ]));
    modal.appendChild(h('.modal-footer', null, [
      h('button.btn', { onclick: closeModal }, t('confirm.cancel')),
      h('button.btn.btn-danger', {
        onclick: async () => {
          const typed = document.getElementById('confirm-drop-input').value.trim();
          if (typed !== tableMeta.name) { toastError(t('confirm.nameMismatch')); return; }
          try {
            await API.dropTable(tableMeta.name, state.activeDb);
            toastSuccess(t('confirm.dropped', { name: tableMeta.name }));
            closeModal();
            if (state.selectedTable === tableMeta.name) {
              state.selectedTable = null;
              state.selectedSchema = null;
              state.data = null;
              switchTab('data');
            }
            await refreshTables();
            renderContent();
          } catch (e) { toastError(e.message); }
        },
      }, [h('span', { html: ICON.trash }), t('confirm.drop')]),
    ]));
    openModal(modal);
  }

  /* ---------- 13. Actions ---------- */
  async function openDatabaseByPath(path, create) {
    try {
      const res = await API.openDatabase(path, create);
      state.activeDb = res.info.path;
      state.dbInfo = res.info;
      state.tables = res.info.tables || [];
      state.selectedTable = null;
      state.selectedSchema = null;
      state.data = null;
      state.dataParams = { page: 1, pageSize: 50, sort: null, order: 'asc', search: '' };
      state.query = { sql: '', result: null, error: null, loading: false };
      state.activeTab = 'data';
      closeModal();
      renderMainApp();
      renderTopbar();
      renderStatusbar();
      // Refresh connections for sidebar (path-based open creates a connection record server-side)
      try { const c = await API.listConnections(); state.connections = c.connections || []; } catch {}
      toastSuccess(t('toast.opened', { name: res.info.fileName }), res.info.isSolodb ? t('toast.solodbDb') : t('toast.sqliteDb'));
    } catch (e) {
      toastError(e.message, t('toast.failedOpen'));
    }
  }

  async function selectTable(name) {
    state.selectedTable = name;
    state.selectedSchema = null;
    state.data = null;
    state.dataParams = { ...state.dataParams, page: 1, sort: null, order: 'asc', search: '' };
    if (state.activeTab === 'info') state.activeTab = 'data';
    renderSidebarList();
    renderContent();
    renderStatusbar();
    // Fire parallel loads
    loadData();
    loadSchema();
  }

  async function loadData() {
    if (!state.selectedTable || !state.activeDb) return;
    state.loading.data = true;
    // Only update the grid+footer, not the toolbar (preserves search input focus).
    if (state.activeTab === 'data') renderDataGrid();
    try {
      const params = {
        page: state.dataParams.page,
        pageSize: state.dataParams.pageSize,
      };
      if (state.dataParams.sort) {
        params.sort = state.dataParams.sort;
        params.order = state.dataParams.order;
      }
      if (state.dataParams.search) params.search = state.dataParams.search;
      const res = await API.getData(state.selectedTable, state.activeDb, params);
      state.data = res.data;
    } catch (e) {
      toastError(e.message, t('toast.failedLoadData'));
      state.data = null;
    } finally {
      state.loading.data = false;
      if (state.activeTab === 'data') renderDataGrid();
      renderStatusbar();
    }
  }

  async function loadSchema() {
    if (!state.selectedTable || !state.activeDb) return;
    state.loading.schema = true;
    try {
      const res = await API.getSchema(state.selectedTable, state.activeDb);
      state.selectedSchema = res.schema;
    } catch (e) {
      // silent — will retry on tab switch
    } finally {
      state.loading.schema = false;
      if (state.activeTab === 'structure') renderContent();
    }
  }

  async function refreshTables() {
    if (!state.activeDb) return;
    try {
      const [infoRes, tablesRes] = await Promise.all([
        API.getDatabaseInfo(state.activeDb),
        API.listTables(state.activeDb),
      ]);
      state.dbInfo = infoRes.info;
      state.tables = tablesRes.tables || [];
      renderTopbar();
      renderSidebarList();
      renderStatusbar();
    } catch (e) {
      // silent
    }
  }

  async function refreshAll() {
    if (!state.activeDb) return;
    state.loading.data = true;
    state.loading.schema = true;
    renderTopbar();
    renderContent();
    try {
      await Promise.all([
        (async () => {
          const infoRes = await API.getDatabaseInfo(state.activeDb);
          state.dbInfo = infoRes.info;
          state.tables = infoRes.info.tables || [];
        })(),
        loadData(),
        loadSchema(),
      ]);
    } catch (e) {
      toastError(e.message, t('toast.refreshFailed'));
    } finally {
      renderTopbar();
      renderSidebarList();
      renderContent();
      renderStatusbar();
    }
  }

  /* ---------- Boot ---------- */
  async function boot() {
    applyTheme();
    applyLang();
    // Prefetch files for the welcome screen.
    try {
      const res = await API.listFiles();
      state.files = res.files || [];
    } catch {}
    try {
      const c = await API.listConnections();
      state.connections = c.connections || [];
    } catch {}
    renderTopbar();
    renderWelcome();
    renderStatusbar();
  }

  document.addEventListener('DOMContentLoaded', boot);
  </script>
</body>
</html>
