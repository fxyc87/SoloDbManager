<!DOCTYPE html>
<!--
  SoloDB Manager — single-file vanilla JS frontend (HTML + CSS + JS in one file).
  Served as a static index.html by the C# ASP.NET Core AOT backend.
  Provides a complete GUI for browsing/querying/editing SoloDB collections
  (JSON documents stored as JSONB in SQLite) and plain SQLite tables.
  No external dependencies, no build step, no CDN. Modern Chromium only.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoloDB Manager</title>
  <style>
    /* ============================================================
       Theme tokens — light + dark via CSS custom properties.
       Emerald/teal accent for SoloDB, sky/teal for regular tables,
       amber for SoloDB internal tables. NO indigo/blue.
       ============================================================ */
    :root {
      --bg: #ffffff;
      --bg-elev: #f8fafc;
      --bg-elev-2: #f1f5f9;
      --bg-hover: #f1f5f9;
      --surface: #ffffff;
      --surface-2: #fafafa;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-faint: #94a3b8;

      --accent: #10b981;        /* emerald-500 */
      --accent-fg: #ffffff;
      --accent-soft: #d1fae5;   /* emerald-100 */
      --accent-strong: #047857; /* emerald-700 */

      --teal: #0d9488;          /* teal-600 */
      --teal-soft: #ccfbf1;
      --sky: #0284c7;           /* sky-600 */
      --sky-soft: #e0f2fe;
      --amber: #d97706;         /* amber-600 */
      --amber-soft: #fef3c7;
      --rose: #e11d48;
      --rose-soft: #ffe4e6;
      --purple: #9333ea;
      --purple-soft: #f3e8ff;

      --header-h: 56px;
      --footer-h: 28px;
      --sidebar-w: 256px;

      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.16);
      --ring: 0 0 0 2px var(--accent);

      --radius: 8px;
      --radius-sm: 6px;
      --radius-lg: 12px;

      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      --font-mono: "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas,
        "Liberation Mono", monospace;
    }
    [data-theme="dark"] {
      --bg: #0b1120;
      --bg-elev: #0f172a;
      --bg-elev-2: #1e293b;
      --bg-hover: #1e293b;
      --surface: #0f172a;
      --surface-2: #131c31;
      --border: #1e293b;
      --border-strong: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --text-faint: #64748b;

      --accent: #10b981;
      --accent-fg: #04130d;
      --accent-soft: #064e3b;
      --accent-strong: #6ee7b7;

      --teal: #2dd4bf;
      --teal-soft: #134e4a;
      --sky: #38bdf8;
      --sky-soft: #0c4a6e;
      --amber: #fbbf24;
      --amber-soft: #78350f;
      --rose: #fb7185;
      --rose-soft: #4c0519;
      --purple: #c084fc;
      --purple-soft: #3b0764;

      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.6);
    }

    /* ============================================================
       Reset & base
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    button, input, select, textarea { font: inherit; color: inherit; }
    button { cursor: pointer; background: none; border: none; padding: 0; }
    a { color: var(--accent-strong); text-decoration: none; }
    a:hover { text-decoration: underline; }
    ::selection { background: var(--accent-soft); color: var(--text); }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 5px;
      border: 2px solid var(--bg);
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

    /* ============================================================
       App layout — top bar + sidebar + content + status bar
       ============================================================ */
    #app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .topbar {
      height: var(--header-h);
      flex: 0 0 var(--header-h);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      z-index: 20;
    }
    .topbar .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      white-space: nowrap;
    }
    .topbar .brand .logo {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--accent), var(--teal));
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: -0.5px;
      box-shadow: var(--shadow-sm);
    }
    .topbar .db-summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: var(--bg-elev);
      border: 1px solid var(--border);
      font-size: 13px;
      min-width: 0;
    }
    .topbar .db-summary .name {
      font-weight: 600;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .topbar .db-summary .stats {
      color: var(--text-muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .topbar .spacer { flex: 1; }
    .topbar .actions { display: flex; align-items: center; gap: 6px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .badge-solodb { background: var(--accent-soft); color: var(--accent-strong); }
    .badge-sqlite { background: var(--sky-soft); color: var(--sky); }
    .badge-internal { background: var(--amber-soft); color: var(--amber); }
    .badge-regular { background: var(--sky-soft); color: var(--sky); }
    .badge-collection { background: var(--accent-soft); color: var(--accent-strong); }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.12s, border-color 0.12s, transform 0.05s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--bg-hover); border-color: var(--border-strong); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary {
      background: var(--accent);
      color: var(--accent-fg);
      border-color: var(--accent);
    }
    .btn-primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
    .btn-ghost { background: transparent; border-color: transparent; }
    .btn-ghost:hover { background: var(--bg-hover); border-color: var(--border); }
    .btn-icon { width: 32px; padding: 0; justify-content: center; }
    .btn-sm { height: 28px; padding: 0 8px; font-size: 12px; }
    .btn-danger { color: var(--rose); border-color: var(--border); }
    .btn-danger:hover { background: var(--rose-soft); border-color: var(--rose); }

    /* Main layout */
    .main {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      flex: 0 0 var(--sidebar-w);
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .sidebar-head {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .search-input {
      width: 100%;
      height: 32px;
      padding: 0 10px 0 32px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
      font-size: 13px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>");
      background-repeat: no-repeat;
      background-position: 10px center;
    }
    .search-input:focus { outline: none; border-color: var(--accent); box-shadow: var(--ring); }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      min-height: 0;
    }
    .sidebar-section { margin-bottom: 4px; }
    .sidebar-section-head {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      user-select: none;
    }
    .sidebar-section-head:hover { background: var(--bg-hover); }
    .sidebar-section-head .chevron { transition: transform 0.15s; display: inline-flex; }
    .sidebar-section.collapsed .chevron { transform: rotate(-90deg); }
    .sidebar-section.collapsed .sidebar-section-body { display: none; }
    .sidebar-section-head .count {
      margin-left: auto;
      color: var(--text-faint);
      font-size: 11px;
      font-weight: 500;
    }
    .sidebar-section-body { display: flex; flex-direction: column; gap: 1px; margin-top: 2px; }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px 6px 28px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      position: relative;
      min-height: 30px;
    }
    .sidebar-item:hover { background: var(--bg-hover); }
    .sidebar-item.active {
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 600;
    }
    .sidebar-item .icon {
      width: 8px; height: 8px; border-radius: 2px; flex: 0 0 8px;
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    }
    .sidebar-item .name {
      flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .sidebar-item .rowcount {
      font-size: 11px;
      color: var(--text-faint);
      background: var(--bg-elev);
      padding: 1px 6px;
      border-radius: 999px;
      font-variant-numeric: tabular-nums;
    }
    .sidebar-item.active .rowcount { background: rgba(255,255,255,0.4); color: var(--accent-strong); }
    [data-theme="dark"] .sidebar-item.active .rowcount { background: rgba(0,0,0,0.3); }

    .icon-collection { background: var(--accent); }
    .icon-regular { background: var(--sky); }
    .icon-internal { background: var(--amber); }

    .sidebar-empty {
      padding: 16px 12px;
      color: var(--text-faint);
      font-size: 12px;
      text-align: center;
    }

    /* Content area */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: var(--bg);
    }
    .tabbar {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex: 0 0 auto;
      min-height: 40px;
    }
    .tab {
      padding: 8px 14px;
      font-size: 13px;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-weight: 500;
      transition: color 0.12s, border-color 0.12s;
      margin-bottom: -1px;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent-strong); border-bottom-color: var(--accent); }
    .tab.disabled { color: var(--text-faint); cursor: not-allowed; }
    .tab.disabled:hover { color: var(--text-faint); }

    .tab-panel {
      flex: 1;
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .tab-panel.hidden { display: none; }

    /* ============================================================
       Welcome screen
       ============================================================ */
    .welcome {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .welcome-inner {
      max-width: 980px;
      width: 100%;
    }
    .welcome-hero {
      text-align: center;
      padding: 48px 24px 40px;
    }
    .welcome-hero .logo-big {
      width: 72px; height: 72px;
      margin: 0 auto 20px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--teal));
      display: grid; place-items: center;
      color: white; font-weight: 800; font-size: 32px;
      letter-spacing: -1px;
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.35);
    }
    .welcome-hero h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 12px;
      background: linear-gradient(135deg, var(--text), var(--accent-strong));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .welcome-hero p {
      color: var(--text-muted);
      font-size: 16px;
      max-width: 580px;
      margin: 0 auto 24px;
    }
    .welcome-hero .cta-row {
      display: flex; justify-content: center; gap: 10px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin: 32px 0 12px;
      padding: 0 4px;
    }

    .demo-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }
    .demo-card {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .demo-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-sm);
      transform: translateY(-1px);
    }
    .demo-card .icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 16px; font-weight: 700;
      flex-shrink: 0;
    }
    .demo-card .info { flex: 1; min-width: 0; }
    .demo-card .name {
      font-weight: 600; font-size: 14px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .demo-card .meta {
      font-size: 12px; color: var(--text-muted);
      margin-top: 2px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .feature-card {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    .feature-card .icon-wrap {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent-strong);
      display: grid; place-items: center;
      margin-bottom: 10px;
    }
    .feature-card h3 { font-size: 14px; font-weight: 600; margin: 0 0 4px; }
    .feature-card p { font-size: 12px; color: var(--text-muted); margin: 0; line-height: 1.5; }

    .explainer {
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent-soft) 0%, transparent 60%);
      margin-top: 8px;
    }
    .explainer h2 { font-size: 18px; font-weight: 700; margin: 0 0 8px; }
    .explainer p { color: var(--text-muted); margin: 0 0 12px; line-height: 1.6; }
    .explainer .link {
      display: inline-flex; align-items: center; gap: 4px;
      color: var(--accent-strong); font-weight: 600; font-size: 13px;
    }

    /* ============================================================
       Data tab
       ============================================================ */
    .data-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-wrap: wrap;
    }
    .data-toolbar .title {
      font-weight: 600; font-size: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .data-toolbar .spacer { flex: 1; }

    .table-search {
      width: 220px;
      height: 30px;
      padding: 0 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-elev);
      font-size: 12px;
    }
    .table-search:focus { outline: none; border-color: var(--accent); box-shadow: var(--ring); }

    .page-size-select {
      height: 30px;
      padding: 0 24px 0 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-elev) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>") no-repeat right 8px center;
      appearance: none;
      font-size: 12px;
    }

    .data-grid-wrap {
      flex: 1;
      overflow: auto;
      min-height: 0;
      position: relative;
    }
    .data-grid {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }
    .data-grid thead th {
      position: sticky; top: 0;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      padding: 8px 10px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      z-index: 2;
      user-select: none;
      cursor: pointer;
      transition: background 0.12s;
    }
    .data-grid thead th:hover { background: var(--bg-elev-2); }
    .data-grid thead th.active { color: var(--accent-strong); background: var(--accent-soft); }
    .data-grid thead th .col-head {
      display: flex; align-items: center; gap: 6px;
    }
    .data-grid thead th .col-name { font-weight: 600; }
    .data-grid thead th .type-badge {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 4px;
      background: var(--bg-elev-2);
      color: var(--text-muted);
      font-weight: 500;
      text-transform: lowercase;
      font-family: var(--font-mono);
    }
    .data-grid thead th.active .type-badge { background: rgba(255,255,255,0.4); }
    [data-theme="dark"] .data-grid thead th.active .type-badge { background: rgba(0,0,0,0.3); }
    .data-grid thead th .sort-arrow { color: var(--accent); font-size: 11px; }
    .data-grid thead th.action-col {
      cursor: default;
      width: 80px;
      text-align: right;
    }
    .data-grid thead th.action-col:hover { background: var(--bg-elev); }

    .data-grid tbody td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      vertical-align: middle;
      max-width: 320px;
      overflow: hidden;
    }
    .data-grid tbody tr:hover td { background: var(--bg-hover); }
    .data-grid tbody tr:hover .row-actions { opacity: 1; }
    .data-grid .row-actions {
      display: flex; justify-content: flex-end; gap: 4px;
      opacity: 0;
      transition: opacity 0.12s;
    }
    .data-grid .row-actions .btn-icon {
      width: 26px; height: 26px;
      border-radius: 5px;
      color: var(--text-muted);
    }
    .data-grid .row-actions .btn-icon:hover {
      background: var(--bg-elev-2);
      color: var(--text);
    }
    .data-grid .row-actions .btn-icon.danger:hover { color: var(--rose); background: var(--rose-soft); }

    .cell-null { color: var(--text-faint); font-style: italic; font-family: var(--font-mono); font-size: 11px; }
    .cell-bool {
      display: inline-flex; align-items: center;
      padding: 1px 7px; border-radius: 4px;
      font-family: var(--font-mono); font-size: 11px; font-weight: 600;
    }
    .cell-bool.true { background: var(--accent-soft); color: var(--accent-strong); }
    .cell-bool.false { background: var(--rose-soft); color: var(--rose); }
    .cell-number {
      font-family: var(--font-mono); font-size: 12px;
      text-align: right; display: block;
      font-variant-numeric: tabular-nums;
    }
    .cell-string {
      font-family: var(--font-mono); font-size: 12px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      display: block; max-width: 320px;
    }
    .cell-string.clickable { cursor: pointer; color: var(--accent-strong); }
    .cell-string.clickable:hover { text-decoration: underline; }
    .cell-json {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--accent-strong); cursor: pointer;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .cell-json:hover { text-decoration: underline; }
    .cell-json .marker { background: var(--accent-soft); padding: 0 4px; border-radius: 3px; }

    .data-footer {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      color: var(--text-muted);
      flex: 0 0 auto;
    }
    .data-footer .page-info { font-variant-numeric: tabular-nums; }
    .data-footer .page-nav { display: flex; gap: 2px; }
    .data-footer .page-nav .btn-icon { width: 28px; height: 28px; }
    .data-footer .spacer { flex: 1; }

    .empty-state {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 24px; text-align: center;
      color: var(--text-muted);
    }
    .empty-state .icon-big {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: var(--bg-elev);
      display: grid; place-items: center;
      margin-bottom: 16px;
      color: var(--text-faint);
    }
    .empty-state h3 { font-size: 15px; font-weight: 600; color: var(--text); margin: 0 0 6px; }
    .empty-state p { font-size: 13px; margin: 0; max-width: 360px; line-height: 1.5; }

    .loading-spinner {
      width: 24px; height: 24px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-overlay {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.6);
      display: grid; place-items: center;
      z-index: 5;
    }
    [data-theme="dark"] .loading-overlay { background: rgba(11,17,32,0.6); }

    /* ============================================================
       Structure tab
       ============================================================ */
    .structure-panel {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      min-height: 0;
    }
    .structure-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .structure-header .name { font-size: 18px; font-weight: 700; }
    .structure-header .stats { color: var(--text-muted); font-size: 13px; }

    .structure-block { margin-bottom: 24px; }
    .structure-block h3 {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
      margin: 0 0 10px;
    }

    .data-grid.compact thead th { font-size: 11px; padding: 6px 8px; }
    .data-grid.compact tbody td { padding: 5px 8px; font-size: 12px; }
    .data-grid.compact thead th.action-col { cursor: default; }
    .data-grid.compact thead th:hover { background: var(--bg-elev); }

    .doc-fields-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
    }
    .doc-field-card {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
    }
    .doc-field-card .key {
      font-family: var(--font-mono); font-size: 13px; font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      word-break: break-all;
    }
    .doc-field-card .meta {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      font-size: 11px; color: var(--text-muted);
    }
    .doc-field-card .sample {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--text-faint);
      margin-top: 4px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .js-type-badge {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: lowercase;
    }
    .js-type-string { background: var(--accent-soft); color: var(--accent-strong); }
    .js-type-number { background: var(--amber-soft); color: var(--amber); }
    .js-type-boolean { background: var(--purple-soft); color: var(--purple); }
    .js-type-object, .js-type-array { background: var(--sky-soft); color: var(--sky); }
    .js-type-null { background: var(--bg-elev-2); color: var(--text-faint); }
    .js-type-mixed { background: var(--bg-elev-2); color: var(--text-muted); }

    .index-item {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      font-size: 13px;
    }
    .index-item .name { font-family: var(--font-mono); font-weight: 600; }
    .index-item .cols { color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; }

    .ddl-block {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      font-family: var(--font-mono);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      overflow-x: auto;
      margin: 0;
    }

    /* ============================================================
       Query tab
       ============================================================ */
    .query-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .query-editor-wrap {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .query-snippets {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .snippet-btn {
      font-size: 11px;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-elev);
      color: var(--text-muted);
      font-family: var(--font-mono);
      transition: all 0.12s;
    }
    .snippet-btn:hover {
      border-color: var(--accent);
      color: var(--accent-strong);
      background: var(--accent-soft);
    }
    .query-editor {
      width: 100%;
      min-height: 90px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-elev);
      font-family: var(--font-mono);
      font-size: 13px;
      resize: vertical;
      color: var(--text);
      line-height: 1.5;
    }
    .query-editor:focus { outline: none; border-color: var(--accent); box-shadow: var(--ring); }
    .query-actions {
      display: flex; align-items: center; gap: 8px;
      margin-top: 8px;
    }
    .query-hint {
      font-size: 11px; color: var(--text-faint);
      margin-left: auto;
    }
    .query-hint kbd {
      font-family: var(--font-mono);
      background: var(--bg-elev-2);
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid var(--border);
      font-size: 10px;
    }

    .query-results {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    .query-stats {
      display: flex; align-items: center; gap: 16px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elev);
      font-size: 12px;
      color: var(--text-muted);
    }
    .query-stats .stat { display: flex; align-items: center; gap: 4px; }
    .query-stats .stat strong { color: var(--text); font-weight: 600; }

    .query-error {
      margin: 14px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      background: var(--rose-soft);
      border: 1px solid var(--rose);
      color: var(--rose);
      font-family: var(--font-mono);
      font-size: 12px;
      white-space: pre-wrap;
    }

    .query-empty {
      padding: 48px;
      text-align: center;
      color: var(--text-faint);
      font-size: 13px;
    }

    /* ============================================================
       Info tab
       ============================================================ */
    .info-panel {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      min-height: 0;
    }
    .info-hero {
      padding: 24px;
      border-radius: var(--radius-lg);
      color: white;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .info-hero.solodb {
      background: linear-gradient(135deg, var(--accent) 0%, var(--teal) 100%);
    }
    .info-hero.sqlite {
      background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
    }
    .info-hero::before {
      content: '';
      position: absolute;
      top: -40%; right: -10%;
      width: 60%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 60%);
      pointer-events: none;
    }
    .info-hero h2 {
      font-size: 24px; font-weight: 800;
      margin: 0 0 6px;
      position: relative;
    }
    .info-hero .path {
      font-family: var(--font-mono); font-size: 12px;
      opacity: 0.9; word-break: break-all;
      position: relative;
    }
    .info-hero .badges {
      display: flex; gap: 6px; margin-top: 10px;
      position: relative;
    }
    .info-hero .badges .badge {
      background: rgba(255,255,255,0.25);
      color: white;
    }

    .info-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .info-stat-card {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    .info-stat-card .label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted); font-weight: 600;
    }
    .info-stat-card .value {
      font-size: 22px; font-weight: 700; margin-top: 4px;
      font-variant-numeric: tabular-nums;
    }
    .info-stat-card .sub { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 768px) {
      .info-grid { grid-template-columns: 1fr; }
    }
    .info-card {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    .info-card h3 {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted); margin: 0 0 10px;
    }
    .info-card .item {
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      font-size: 13px;
    }
    .info-card .item:hover { background: var(--bg-hover); }
    .info-card .item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .info-card .item .count {
      font-size: 11px; color: var(--text-faint);
      font-variant-numeric: tabular-nums;
    }

    .pragma-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 6px;
    }
    .pragma-item {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      font-size: 12px;
      display: flex; flex-direction: column;
    }
    .pragma-item .name { color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; }
    .pragma-item .value { font-family: var(--font-mono); font-weight: 600; word-break: break-all; }

    .about-card {
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent-soft) 0%, transparent 60%);
      margin-top: 16px;
    }
    .about-card h3 { margin: 0 0 6px; font-size: 14px; font-weight: 700; }
    .about-card p { margin: 0 0 8px; font-size: 13px; color: var(--text-muted); line-height: 1.6; }
    .about-card a { font-weight: 600; font-size: 13px; }

    /* ============================================================
       Status bar (footer)
       ============================================================ */
    .statusbar {
      height: var(--footer-h);
      flex: 0 0 var(--footer-h);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      border-top: 1px solid var(--border);
      background: var(--bg-elev);
      font-size: 11px;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .statusbar .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-faint);
    }
    .statusbar .dot.connected { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .statusbar .sep { color: var(--border-strong); }
    .statusbar .spacer { flex: 1; }
    .statusbar .hint { color: var(--text-faint); }

    /* ============================================================
       Modal
       ============================================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 16px 16px;
      z-index: 100;
      animation: fadeIn 0.12s ease-out;
    }
    [data-theme="dark"] .modal-overlay { background: rgba(0, 0, 0, 0.65); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      animation: slideUp 0.16s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal.modal-lg { max-width: 760px; }
    .modal.modal-xl { max-width: 960px; }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { font-size: 15px; font-weight: 700; margin: 0; }
    .modal-close {
      width: 28px; height: 28px;
      display: grid; place-items: center;
      border-radius: 6px;
      color: var(--text-muted);
    }
    .modal-close:hover { background: var(--bg-hover); color: var(--text); }

    .modal-body {
      padding: 16px 18px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }
    .modal-footer {
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      background: var(--bg-elev);
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }

    /* Tabs inside modal */
    .modal-tabs {
      display: flex;
      gap: 2px;
      padding: 0 18px;
      border-bottom: 1px solid var(--border);
    }
    .modal-tab {
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-weight: 500;
      margin-bottom: -1px;
    }
    .modal-tab:hover { color: var(--text); }
    .modal-tab.active { color: var(--accent-strong); border-bottom-color: var(--accent); }
    .modal-tab-pane { display: none; padding: 14px 18px; }
    .modal-tab-pane.active { display: block; }

    .form-row { margin-bottom: 12px; }
    .form-row label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      height: 34px;
      padding: 0 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
      font-size: 13px;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none; border-color: var(--accent); box-shadow: var(--ring);
    }
    .form-textarea {
      height: auto;
      padding: 10px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      min-height: 100px;
    }
    .form-textarea.tall { min-height: 240px; }
    .form-hint {
      font-size: 11px; color: var(--text-faint); margin-top: 4px;
    }

    /* File list in open modal */
    .file-list, .conn-list {
      max-height: 360px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-elev);
    }
    .file-item, .conn-item {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
    }
    .file-item:last-child, .conn-item:last-child { border-bottom: none; }
    .file-item:hover, .conn-item:hover { background: var(--bg-hover); }
    .file-item .icon, .conn-item .icon {
      width: 30px; height: 30px;
      border-radius: 7px;
      display: grid; place-items: center;
      flex-shrink: 0;
      font-size: 13px; font-weight: 700;
    }
    .file-item .icon.solodb, .conn-item .icon.solodb {
      background: var(--accent-soft); color: var(--accent-strong);
    }
    .file-item .icon.sqlite, .conn-item .icon.sqlite {
      background: var(--sky-soft); color: var(--sky);
    }
    .file-item .info, .conn-item .info { flex: 1; min-width: 0; }
    .file-item .name, .conn-item .name {
      font-weight: 600; font-size: 13px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .file-item .meta, .conn-item .meta {
      font-size: 11px; color: var(--text-muted);
      margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .conn-item .delete-btn {
      width: 26px; height: 26px;
      display: grid; place-items: center;
      border-radius: 5px;
      color: var(--text-faint);
    }
    .conn-item .delete-btn:hover { background: var(--rose-soft); color: var(--rose); }
    .file-item .delete-btn {
      width: 26px; height: 26px;
      display: grid; place-items: center;
      border-radius: 5px;
      color: var(--text-faint);
      opacity: 0;
      transition: opacity .12s;
    }
    .file-item:hover .delete-btn { opacity: 1; }
    .file-item .delete-btn:hover { background: var(--rose-soft); color: var(--rose); }

    .upload-dropzone {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 12px;
      margin-bottom: 8px;
      border: 1.5px dashed var(--border-strong);
      border-radius: 8px;
      background: var(--bg-elev);
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: border-color .12s, background .12s;
    }
    .upload-dropzone:hover, .upload-dropzone:focus {
      border-color: var(--accent);
      color: var(--text);
      outline: none;
    }
    .upload-dropzone.drag-over {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-strong);
    }
    .upload-dropzone .link {
      color: var(--accent-strong);
      text-decoration: underline;
    }
    .upload-dropzone .icon-svg {
      width: 16px; height: 16px;
      color: var(--accent);
    }

    .empty-list {
      padding: 32px 16px;
      text-align: center;
      color: var(--text-faint);
      font-size: 13px;
    }

    /* New table dialog — card selector */
    .kind-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .kind-card {
      padding: 14px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      background: var(--surface);
    }
    .kind-card:hover { border-color: var(--border-strong); }
    .kind-card.selected.solodb { border-color: var(--accent); background: var(--accent-soft); }
    .kind-card.selected.regular { border-color: var(--sky); background: var(--sky-soft); }
    .kind-card .icon-wrap {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: grid; place-items: center;
      margin-bottom: 8px;
    }
    .kind-card.solodb .icon-wrap { background: var(--accent-soft); color: var(--accent-strong); }
    .kind-card.regular .icon-wrap { background: var(--sky-soft); color: var(--sky); }
    .kind-card h4 { font-size: 14px; font-weight: 700; margin: 0 0 4px; }
    .kind-card p { font-size: 12px; color: var(--text-muted); margin: 0; line-height: 1.4; }

    /* Column builder */
    .column-builder { margin-top: 8px; }
    .column-row {
      display: grid;
      grid-template-columns: 1.6fr 1fr auto auto auto;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }
    .column-row input, .column-row select {
      height: 30px;
      padding: 0 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-elev);
      font-size: 12px;
    }
    .column-row input:focus, .column-row select:focus {
      outline: none; border-color: var(--accent);
    }
    .column-row .col-check {
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px;
    }
    .column-row .col-check label {
      font-size: 10px; color: var(--text-faint);
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer;
    }
    .column-row .col-check input { margin: 0; }
    .column-row .col-remove {
      width: 30px; height: 30px;
      display: grid; place-items: center;
      border-radius: 5px;
      color: var(--text-faint);
    }
    .column-row .col-remove:hover { background: var(--rose-soft); color: var(--rose); }

    /* ============================================================
       Popovers (for cell expansion / JSON tree)
       ============================================================ */
    .popover {
      position: fixed;
      z-index: 200;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 12px;
      max-width: 480px;
      max-height: 360px;
      overflow: auto;
      animation: slideUp 0.1s ease-out;
    }
    .popover pre {
      margin: 0;
      font-family: var(--font-mono);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text);
    }
    .popover .raw-pre {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
    }

    /* JSON tree */
    .json-tree {
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
    }
    .json-tree .node { display: flex; align-items: flex-start; gap: 4px; }
    .json-tree .node .guide {
      color: var(--border-strong);
      white-space: pre;
      user-select: none;
      flex-shrink: 0;
    }
    .json-tree .node .chevron {
      cursor: pointer;
      width: 14px;
      flex-shrink: 0;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      padding-top: 2px;
    }
    .json-tree .node .chevron:hover { color: var(--text); }
    .json-tree .node .key { color: var(--text); }
    .json-tree .node .colon { color: var(--text-faint); }
    .json-tree .node .val-string { color: var(--accent-strong); }
    .json-tree .node .val-number { color: var(--amber); }
    .json-tree .node .val-boolean { color: var(--purple); }
    .json-tree .node .val-null { color: var(--text-faint); font-style: italic; }
    .json-tree .node .val-container { color: var(--sky); }
    .json-tree .node .comma { color: var(--text-faint); }
    .json-tree .node .preview { color: var(--text-faint); }

    /* ============================================================
       Toasts
       ============================================================ */
    #toast-root {
      position: fixed;
      bottom: 16px;
      right: 16px;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      z-index: 300;
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      min-width: 260px;
      max-width: 380px;
      padding: 12px 14px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      animation: toastIn 0.18s ease-out;
    }
    @keyframes toastIn {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .toast.success { border-left: 3px solid var(--accent); }
    .toast.error { border-left: 3px solid var(--rose); }
    .toast.info { border-left: 3px solid var(--sky); }
    .toast .toast-icon {
      flex-shrink: 0;
      width: 18px; height: 18px;
      display: grid; place-items: center;
    }
    .toast.success .toast-icon { color: var(--accent); }
    .toast.error .toast-icon { color: var(--rose); }
    .toast.info .toast-icon { color: var(--sky); }
    .toast .toast-body { flex: 1; min-width: 0; }
    .toast .toast-title { font-weight: 600; margin-bottom: 2px; }
    .toast .toast-msg { color: var(--text-muted); font-size: 12px; word-break: break-word; }
    .toast .toast-close {
      color: var(--text-faint);
      width: 18px; height: 18px;
      display: grid; place-items: center;
      border-radius: 4px;
    }
    .toast .toast-close:hover { background: var(--bg-hover); color: var(--text); }

    /* Confirm dialog */
    .confirm-text { font-size: 14px; margin: 0 0 6px; }
    .confirm-sub { font-size: 12px; color: var(--text-muted); margin: 0; }

    /* Type badge in headers */
    .col-type {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--bg-elev-2);
      color: var(--text-muted);
      text-transform: lowercase;
    }

    /* Small icon helpers (inline SVG-styled) */
    .icon-svg { width: 16px; height: 16px; display: inline-block; vertical-align: middle; }
    .icon-svg.sm { width: 14px; height: 14px; }

    /* ============================================================
       Quick actions bar (data tab)
       ============================================================ */
    .quick-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elev);
      flex-wrap: wrap;
      font-size: 12px;
    }
    .quick-actions .qa-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-right: 2px;
      white-space: nowrap;
    }
    .quick-actions .qa-divider {
      width: 1px;
      height: 18px;
      background: var(--border);
      flex: 0 0 1px;
    }
    .quick-actions select.qa-select {
      height: 28px;
      padding: 0 22px 0 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      color: var(--text);
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>");
      background-repeat: no-repeat;
      background-position: right 6px center;
      max-width: 160px;
    }
    .quick-actions select.qa-select:focus {
      outline: none; border-color: var(--accent); box-shadow: var(--ring);
    }
    .quick-actions input.qa-input {
      width: 64px;
      height: 28px;
      padding: 0 8px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .quick-actions input.qa-input:focus {
      outline: none; border-color: var(--accent); box-shadow: var(--ring);
    }
    .quick-actions .btn-sm { height: 28px; }
    .quick-actions .qa-static {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ============================================================
       Browse tab (open modal)
       ============================================================ */
    .browse-pane { padding: 14px 18px; }
    .browse-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .browse-path-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      font-size: 12px;
    }
    .browse-path-bar .path-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .browse-path-bar .path-text {
      flex: 1;
      font-family: var(--font-mono);
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }
    .browse-list {
      max-height: 360px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-elev);
    }
    .browse-item {
      padding: 9px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
    }
    .browse-item:last-child { border-bottom: none; }
    .browse-item:hover { background: var(--bg-hover); }
    .browse-item .icon {
      width: 26px; height: 26px;
      border-radius: 6px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .browse-item .icon.folder { background: var(--amber-soft); color: var(--amber); }
    .browse-item .icon.dbfile { background: var(--accent-soft); color: var(--accent-strong); }
    .browse-item .name {
      flex: 1; min-width: 0;
      font-size: 13px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .browse-item.folder .name { font-weight: 500; }
    .browse-item.dbfile .name { font-weight: 600; }
    .browse-item .meta {
      font-size: 11px; color: var(--text-faint);
      font-family: var(--font-mono);
      white-space: nowrap;
    }
    .browse-error {
      padding: 12px 14px;
      background: var(--rose-soft);
      border: 1px solid var(--rose);
      border-radius: var(--radius-sm);
      color: var(--rose);
      font-size: 12px;
      margin-bottom: 10px;
      white-space: pre-wrap;
      font-family: var(--font-mono);
    }
    .browse-empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--text-faint);
      font-size: 13px;
    }

    /* Lang toggle button — compact */
    .btn-lang {
      min-width: 44px;
      justify-content: center;
      font-weight: 600;
      font-size: 12px;
    }

    /* Responsive: collapse sidebar on small screens */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .topbar .db-summary .stats { display: none; }
      .data-toolbar { padding: 8px; }
      .table-search { width: 140px; }
      .quick-actions { padding: 6px 8px; gap: 6px; }
      .quick-actions .qa-label { display: none; }
    }
  </style>
</head>

  function detectLang() {
    try {
      const saved = localStorage.getItem('solodb-lang');
      if (saved === 'en' || saved === 'zh') return saved;
    } catch {}
    const nav = (navigator.language || 'en').toLowerCase();
    return nav.startsWith('zh') ? 'zh' : 'en';
  }

  // t(key, params?) — translate a key with optional {placeholder} substitution.
  // Falls back to English, then to the key itself if missing.
  function t(key, params) {
    const dict = I18N[state.lang] || I18N.en;
    let s = dict[key];
    if (s === undefined) s = I18N.en[key];
    if (s === undefined) return key;
    if (params) {
      for (const k in params) {
        s = s.split('{' + k + '}').join(String(params[k]));
      }
    }
    return s;
  }

  function applyLang() {
    document.documentElement.setAttribute('lang', state.lang);
    try { localStorage.setItem('solodb-lang', state.lang); } catch {}
    document.title = t('app.title');
    const brandEl = document.getElementById('brand-text');
    if (brandEl) brandEl.textContent = t('app.title');
    const hintEl = document.getElementById('statusbar-hint');
    if (hintEl) hintEl.textContent = t('app.footerHint');
  }

  function toggleLang() {
    state.lang = state.lang === 'en' ? 'zh' : 'en';
    applyLang();
    renderTopbar();
    renderStatusbar();
    if (state.dbInfo) {
      renderMainApp();
    } else {
      renderWelcome();
    }
  }

  /* ---------- 1. State ---------- */
  const state = {
    theme: localStorage.getItem('solodb-theme') || 'light',
    lang: detectLang(),
    connections: [],
    files: [],
    activeDb: null,          // absolute path
    dbInfo: null,            // DatabaseInfo
    tables: [],              // TableSummary[]
    selectedTable: null,     // name
    selectedSchema: null,    // TableSchema
    selectedKind: null,      // for caching
    data: null,              // PageResult
    dataParams: { page: 1, pageSize: 50, sort: null, order: 'asc', search: '' },
    activeTab: 'data',
    sidebarFilter: '',
    collapsedSections: { collections: false, tables: false, internal: true },
    query: { sql: '', result: null, error: null, loading: false },
    loading: { data: false, schema: false, tables: false, info: false },
  };

  const PAGE_SIZE_OPTIONS = [10, 25, 50, 100, 200];
  const DOCS_URL = 'https://www.solodb.org/docs.html';

  /* ---------- 2. API client ---------- */
  async function api(path, options = {}) {
    const opts = { headers: {}, ...options };
    if (opts.body && typeof opts.body !== 'string') {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(opts.body);
    }
    let res;
    try {
      res = await fetch(path, opts);
    } catch (e) {
      throw new Error(t('toast.networkError') + e.message);
    }
    const text = await res.text();
    let data = null;
    if (text) {
      try { data = JSON.parse(text); }
      catch { data = { error: text }; }
    }
    if (!res.ok) {
      const msg = (data && data.error) || `HTTP ${res.status}`;
      const err = new Error(msg);
      err.status = res.status;
      err.body = data;
      throw err;
    }
    return data;
  }

  const API = {
    listConnections: () => api('/api/connections'),
    addConnection: (body) => api('/api/connections', { method: 'POST', body }),
    deleteConnection: (id) => api(`/api/connections/${encodeURIComponent(id)}`, { method: 'DELETE' }),
    listFiles: () => api('/api/database/files'),
    uploadFile: (file) => {
      const fd = new FormData();
      fd.append('file', file);
      return fetch('/api/database/files/upload', { method: 'POST', body: fd })
        .then(r => r.ok ? r.json() : r.json().then(j => Promise.reject(new Error(j.error || 'Upload failed'))));
    },
    deleteFile: (name) => api(`/api/database/files/${encodeURIComponent(name)}`, { method: 'DELETE' }),
    openDatabase: (path, create) => api('/api/database/open', { method: 'POST', body: { path, create } }),
    getDatabaseInfo: (path) => api('/api/database/info?db=' + encodeURIComponent(path)),
    listTables: (path) => api('/api/database/tables?db=' + encodeURIComponent(path)),
    createTable: (body) => api('/api/database/tables', { method: 'POST', body }),
    dropTable: (table, db) => api(`/api/database/tables/${encodeURIComponent(table)}?db=${encodeURIComponent(db)}`, { method: 'DELETE' }),
    getSchema: (table, db) => api(`/api/database/tables/${encodeURIComponent(table)}/schema?db=${encodeURIComponent(db)}`),
    getData: (table, db, params) => {
      const q = new URLSearchParams({ db, ...params });
      return api(`/api/database/tables/${encodeURIComponent(table)}/data?${q}`);
    },
    insertRow: (table, db, body) => api(`/api/database/tables/${encodeURIComponent(table)}/data?db=${encodeURIComponent(db)}`, { method: 'POST', body }),
    updateRow: (table, db, body) => api(`/api/database/tables/${encodeURIComponent(table)}/data?db=${encodeURIComponent(db)}`, { method: 'PATCH', body }),
    deleteRow: (table, db, body) => api(`/api/database/tables/${encodeURIComponent(table)}/data?db=${encodeURIComponent(db)}`, { method: 'DELETE', body }),
    runQuery: (db, sql) => api('/api/database/query', { method: 'POST', body: { db, sql } }),
    browsePath: (dir) => api('/api/database/browse' + (dir ? ('?dir=' + encodeURIComponent(dir)) : '')),
  };

  /* ---------- 3. Utilities ---------- */
  function formatBytes(bytes) {
    if (bytes == null) return '—';
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return `${parseFloat((bytes / Math.pow(k, i)).toFixed(i < 2 ? 0 : 2))} ${sizes[i]}`;
  }
  function formatNumber(n) {
    if (n == null) return '—';
    return n.toLocaleString();
  }
  function kindLabel(kind) {
    switch (kind) {
      case 'solodb-collection': return t('kind.solodbCollection');
      case 'solodb-internal': return t('kind.solodbInternal');
      case 'regular': return t('kind.regular');
      default: return kind;
    }
  }
  function kindLabelLower(kind) {
    switch (kind) {
      case 'solodb-collection': return t('kind.collectionLower');
      case 'solodb-internal': return t('kind.solodbInternal');
      case 'regular': return t('kind.tableLower');
      default: return kind;
    }
  }
  function kindBadgeClass(kind) {
    switch (kind) {

  // h() — minimal hyperscript-like DOM builder.
  // h('div.class1.class2', {attr: val}, [children]) or h('div', 'text')
  function h(tag, attrs, children) {
    let tagname = tag, classes = [], id = null;
    // Parse tag string: "tagname.class1.class2#id" or ".class#id" (defaults to div)
    const hashIdx = tag.indexOf('#');
    if (hashIdx >= 0) {
      const after = tag.slice(hashIdx + 1);
      // id runs until the next '.' or end
      const dotAfter = after.indexOf('.');
      if (dotAfter >= 0) { id = after.slice(0, dotAfter); tag = tag.slice(0, hashIdx) + after.slice(dotAfter); }
      else { id = after; tag = tag.slice(0, hashIdx); }
    }
    const parts = tag.split('.');
    if (parts.length > 1) {
      tagname = parts[0] || 'div';
      classes = parts.slice(1);
    } else if (parts[0] === '') {
      tagname = 'div';
    }
    const el = document.createElement(tagname);
    if (classes.length) el.className = classes.join(' ');
    if (id) el.id = id;
    if (attrs) {
      for (const k in attrs) {
        const v = attrs[k];
        if (v == null || v === false) continue;
        if (k === 'class' && typeof v === 'string') el.className += ' ' + v;
        else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
        else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2).toLowerCase(), v);
        else if (k === 'html') el.innerHTML = v;
        else if (v === true) el.setAttribute(k, '');
        else el.setAttribute(k, v);
      }
    }
    // For form fields, set value via property to ensure correct rendering.
    if (attrs && Object.prototype.hasOwnProperty.call(attrs, 'value') && (tagname === 'input' || tagname === 'textarea' || tagname === 'select')) {
      el.value = attrs.value == null ? '' : attrs.value;
    }
    appendChildren(el, children);
    return el;
  }
  function appendChildren(el, children) {
    if (children == null) return;

  /* ---------- Toast system ---------- */
  function toast(opts) {
    if (typeof opts === 'string') opts = { msg: opts };
    const { type = 'info', title, msg, duration = 4000 } = opts;
    const root = document.getElementById('toast-root');
    const t = h(`.toast.${type}`, null, [
      h('.toast-icon', { html: type === 'success' ? ICON.check : type === 'error' ? ICON.alert : ICON.info }),
      h('.toast-body', null, [
        title ? h('.toast-title', null, title) : null,
        msg ? h('.toast-msg', null, msg) : null,
      ]),
      h('.toast-close', { html: ICON.x, onclick: () => t.remove() }),
    ]);
    root.appendChild(t);
    if (duration > 0) setTimeout(() => { if (t.parentNode) t.remove(); }, duration);
  }
  const toastSuccess = (msg, title) => toast({ type: 'success', title: title || t('toast.success'), msg });
  const toastError = (msg, title) => toast({ type: 'error', title: title || t('toast.error'), msg, duration: 6000 });
  const toastInfo = (msg, title) => toast({ type: 'info', title, msg });

  /* ---------- Theme ---------- */
  function applyTheme() {
    document.documentElement.setAttribute('data-theme', state.theme);
    localStorage.setItem('solodb-theme', state.theme);

  /* ---------- 4. JSON tree ---------- */
  // Build a DOM tree for a JSON value with type-colored values and indent guides.
  function buildJsonTree(value, opts = {}) {
    const wrap = h('.json-tree');
    wrap.appendChild(jsonNode(null, value, 0, true, opts.expandDepth ?? 1));
    return wrap;
  }
  function jsonNode(name, value, depth, isLast, expandDepth) {
    const kind = kindOf(value);
    const isContainer = kind === 'array' || kind === 'object';
    const guide = '│  '.repeat(depth);
    const node = h('.node');

    if (!isContainer) {
      // Leaf node
      node.appendChild(h('.guide', null, guide));
      if (name !== null) {
        node.appendChild(h('.key', null, JSON.stringify(name)));
        node.appendChild(h('.colon', null, ': '));
      }
      const valClass = `val-${kind === 'bigint' ? 'number' : kind}`;
      const valText = kind === 'null' ? 'null'
                    : kind === 'string' ? JSON.stringify(value)
                    : String(value);
      node.appendChild(h(`.${valClass}`, null, valText));
      if (!isLast) node.appendChild(h('.comma', null, ','));
      return node;
    }

    // Container
    const entries = kind === 'array'
      ? value.map((v, i) => [String(i), v])
      : Object.entries(value);

    // Header (toggle-able)
    const header = h('.node', { style: { cursor: 'pointer' } });
    header.appendChild(h('.guide', null, guide));
    const chevron = h('.chevron', { html: ICON.chevronDown });
    header.appendChild(chevron);
    if (name !== null) {
      header.appendChild(h('.key', null, JSON.stringify(name)));
      header.appendChild(h('.colon', null, ': '));
    }
    header.appendChild(h('.val-container', null, kind === 'array' ? '[' : '{'));
    const previewSpan = h('.preview');
    if (depth >= expandDepth) {
      chevron.innerHTML = ICON.chevronRight;
      previewSpan.textContent = previewOf(value, kind) + (kind === 'array' ? ' ]' : ' }') + (isLast ? '' : ',');
      header.appendChild(previewSpan);
    } else {
      // Will show children; preview hidden
    }
    node.appendChild(header);

    const childrenWrap = h('div');
    if (depth >= expandDepth) {
      childrenWrap.style.display = 'none';
    }
    entries.forEach(([k, v], i) => {
      childrenWrap.appendChild(jsonNode(k, v, depth + 1, i === entries.length - 1, expandDepth));
    });
    // Closing bracket
    const close = h('.node');
    close.appendChild(h('.guide', null, guide));
    close.appendChild(h('.val-container', null, kind === 'array' ? ']' : '}'));
    if (!isLast) close.appendChild(h('.comma', null, ','));
    childrenWrap.appendChild(close);
    node.appendChild(childrenWrap);

    header.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = childrenWrap.style.display !== 'none';
      childrenWrap.style.display = isOpen ? 'none' : '';
      chevron.innerHTML = isOpen ? ICON.chevronRight : ICON.chevronDown;
      previewSpan.style.display = isOpen ? '' : 'none';
      if (isOpen) {
        previewSpan.textContent = previewOf(value, kind) + (kind === 'array' ? ' ]' : ' }') + (isLast ? '' : ',');
      }
    });

    return node;
  }
  function previewOf(value, kind) {
    if (kind === 'array') return `Array(${value.length})`;
    if (kind === 'object') return `{${Object.keys(value).length} keys}`;
    return '';
  }

  /* ---------- 5. Cell renderer ---------- */
  // Renders a value into a table cell with type-aware formatting.
  function renderCell(value, opts = {}) {
    const kind = classify(value);
    if (kind === 'null') {
      return h('.cell-null', null, t('cell.null'));
    }
    if (kind === 'boolean') {
      return h(`.cell-bool ${value ? 'true' : 'false'}`, null, value ? t('cell.true') : t('cell.false'));
    }
    if (kind === 'number') {
      return h('.cell-number', null, String(value));
    }
    if (kind === 'string') {
      const s = value;
      const max = opts.maxChars || 80;
      if (s.length <= max) {
        return h('.cell-string', { title: s }, s);
      }
      const display = s.slice(0, max) + '…';
      const span = h('.cell-string.clickable', null, display);
      span.addEventListener('click', (e) => {
        e.stopPropagation();
        showPopover(span, () => h('pre', null, s));
      });
      return span;
    }
    // object / array — show "{…}" with JSON tree popover
    const inline = JSON.stringify(value);
    const display = inline.length > 80 ? inline.slice(0, 80) + '…' : inline;
    const marker = kind === 'array' ? `[${value.length}]` : '{…}';
    const span = h('.cell-json', null, [
      h('.marker', null, marker),
      h('span', null, display),
    ]);
    span.addEventListener('click', (e) => {
      e.stopPropagation();
      showPopover(span, () => h('div', null, [
        buildJsonTree(value, { expandDepth: 1 }),
        h('pre.raw-pre', null, JSON.stringify(value, null, 2)),
      ]));
    });
    return span;
  }

  /* ---------- Popover ---------- */
  let activePopover = null;
  function showPopover(anchor, contentFn) {
    closePopover();
    const pop = h('.popover');
    const content = contentFn();
    if (Array.isArray(content)) content.forEach(c => pop.appendChild(c));
    else pop.appendChild(content);
    document.getElementById('popover-root').appendChild(pop);
    // Position
    const rect = anchor.getBoundingClientRect();
    const popRect = pop.getBoundingClientRect();
    let left = rect.left;
    let top = rect.bottom + 4;
    if (left + popRect.width > window.innerWidth - 8) {
      left = window.innerWidth - popRect.width - 8;
    }
    if (left < 8) left = 8;
    if (top + popRect.height > window.innerHeight - 8) {
      top = rect.top - popRect.height - 4;
      if (top < 8) top = 8;
    }
    pop.style.left = left + 'px';
    pop.style.top = top + 'px';
    activePopover = pop;
    // Close on outside click
    setTimeout(() => {
      document.addEventListener('click', closePopover, { once: true });
      document.addEventListener('keydown', escClosePopover);
    }, 0);
  }
  function closePopover() {
    if (activePopover) {
      activePopover.remove();
      activePopover = null;
    }
    document.removeEventListener('keydown', escClosePopover);
  }
  function escClosePopover(e) { if (e.key === 'Escape') closePopover(); }
